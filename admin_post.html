<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Maid Admin | ระบบจัดการตารางงาน</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.10.1/main.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.10.1/main.min.js'></script>

    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --primary: #0A1931; --gold: #D4AF37; --bg: #f4f7f6; }
        body { font-family: 'Sarabun', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* Table Styles */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .maid-link { color: var(--primary); font-weight: 700; cursor: pointer; text-decoration: underline; }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: white; margin: 2% auto; padding: 25px; border-radius: 20px; width: 90%; max-width: 1100px; max-height: 90vh; overflow-y: auto; position: relative; }
        .close { position: absolute; right: 20px; top: 15px; font-size: 25px; cursor: pointer; }

        /* Stats */
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-item { background: var(--primary); color: white; padding: 15px; border-radius: 10px; text-align: center; }
        .stat-item b { display: block; font-size: 20px; color: var(--gold); }

        .btn-action { padding: 5px 10px; border-radius: 5px; cursor: pointer; border: 1px solid #ddd; background: #fff; }
        .status-badge { padding: 3px 8px; border-radius: 5px; font-size: 12px; font-weight: 600; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="card">
        <h2><i class="fas fa-tasks"></i> ระบบจัดการแม่บ้านและตารางงาน</h2>
        <div style="background: #e3f2fd; padding: 10px; border-radius: 8px; margin-bottom: 15px;">
            <i class="fas fa-info-circle"></i> คลิกที่ <b>ชื่อแม่บ้าน</b> เพื่อดูปฏิทินงานและชั่วโมงทำงานรวม
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>แม่บ้าน</th>
                    <th>สถานะ</th>
                    <th>งานเช้า</th>
                    <th>งานบ่าย</th>
                    <th>จัดการ</th>
                </tr>
            </thead>
            <tbody id="maidListBody">
                </tbody>
        </table>
    </div>
</div>

<div id="maidModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle">รายละเอียดแม่บ้าน</h2>
        
        <div class="stats-row">
            <div class="stat-item">ชั่วโมงงานรวม<b id="statTotalHours">0 ชม.</b></div>
            <div class="stat-item">งานเดือนนี้<b id="statTotalJobs">0 งาน</b></div>
            <div class="stat-item">สถานะ<b id="statStatus">-</b></div>
        </div>

        <div id='calendar'></div>

        <div id="jobPreview" style="margin-top:20px; padding:15px; background:#f9f9f9; border-radius:10px; display:none;">
            <h4 style="margin-top:0">รายละเอียดงาน</h4>
            <div id="jobDetailText"></div>
        </div>
    </div>
</div>

<script>
    // 1. ตั้งค่า Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyCTWK2HDu1QPn54YJMaTmJ5Xk8MLis3PAU",
        databaseURL: "https://mastermaid-ubon-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "mastermaid-ubon",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let calendar;

    // 2. โหลดรายชื่อแม่บ้าน
    db.ref('maids').on('value', (snapshot) => {
        const maids = snapshot.val();
        const tbody = document.getElementById('maidListBody');
        tbody.innerHTML = '';

        for (let id in maids) {
            const m = maids[id];
            tbody.innerHTML += `
                <tr>
                    <td><span class="maid-link" onclick="openMaidProfile('${id}', '${m.name}')">${m.name}</span></td>
                    <td><span class="status-badge" style="background:${m.status === 'Available' ? '#cbf3f0':'#ffe5ec'}">${m.status}</span></td>
                    <td><button class="btn-action ${m.blocks?.morning ? 'active':''}" onclick="toggleBlock('${id}','morning',${!m.blocks?.morning})">
                        ${m.blocks?.morning ? '🚫 บล็อกอยู่' : '✅ ว่าง'}
                    </button></td>
                    <td><button class="btn-action ${m.blocks?.afternoon ? 'active':''}" onclick="toggleBlock('${id}','afternoon',${!m.blocks?.afternoon})">
                        ${m.blocks?.afternoon ? '🚫 บล็อกอยู่' : '✅ ว่าง'}
                    </button></td>
                    <td><button onclick="updateStatus('${id}', 'Available')">ปลดสถานะ</button></td>
                </tr>
            `;
        }
    });

    // 3. เปิดโปรไฟล์แม่บ้าน (ปฏิทิน + สถิติ)
    function openMaidProfile(maidId, maidName) {
        document.getElementById('maidModal').style.display = 'block';
        document.getElementById('modalTitle').innerText = "ตารางงาน: " + maidName;
        
        // ดึงข้อมูลงานจาก Firebase/bookings (ที่กรองตามชื่อแม่บ้าน)
        db.ref('bookings').orderByChild('maid_id').equalTo(maidId).once('value', (snapshot) => {
            const jobs = snapshot.val() || {};
            let events = [];
            let totalHrs = 0;

            for(let key in jobs) {
                const j = jobs[key];
                events.push({
                    title: j.name + " (" + j.service_type + ")",
                    start: j.date + "T" + j.start_time + ":00:00",
                    end: j.date + "T" + (parseInt(j.start_time) + parseInt(j.duration)) + ":00:00",
                    extendedProps: { customer: j.name, phone: j.phone, detail: j.details, price: j.total_price }
                });
                totalHrs += parseInt(j.duration);
            }

            document.getElementById('statTotalHours').innerText = totalHrs + " ชม.";
            document.getElementById('statTotalJobs').innerText = Object.keys(jobs).length + " งาน";

            // สร้างปฏิทิน
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'th',
                events: events,
                eventClick: function(info) {
                    const p = info.event.extendedProps;
                    document.getElementById('jobPreview').style.display = 'block';
                    document.getElementById('jobDetailText').innerHTML = `
                        <b>ลูกค้า:</b> ${p.customer} | <b>โทร:</b> ${p.phone}<br>
                        <b>วันเวลา:</b> ${info.event.start.toLocaleString()}<br>
                        <b>รายละเอียด:</b> ${p.detail || '-'}<br>
                        <b>ยอดเงิน:</b> ${p.price} บาท
                    `;
                }
            });
            calendar.render();
        });
    }

    // ฟังก์ชันช่วยจัดการสถานะ
    function toggleBlock(id, time, val) {
        let up = {}; up[`blocks/${time}`] = val;
        db.ref('maids/' + id).update(up);
    }

    function updateStatus(id, stat) {
        db.ref('maids/' + id).update({ status: stat });
    }

    function closeModal() {
        document.getElementById('maidModal').style.display = 'none';
        if(calendar) calendar.destroy();
    }
</script>
</body>
</html>
