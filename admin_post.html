<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Master Maid Thailand</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.10.1/main.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.10.1/main.min.js'></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0A1931; --gold: #D4AF37; }
        body { font-family: 'Sarabun', sans-serif; background: #f4f7f6; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        .maid-name { color: var(--primary); font-weight: 700; cursor: pointer; text-decoration: underline; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: white; margin: 2% auto; padding: 25px; border-radius: 20px; width: 90%; max-width: 1000px; position: relative; }
        #calendar { margin-top: 20px; height: 500px; }
    </style>
</head>
<body>
    <div class="card">
        <h2><i class="fas fa-user-shield"></i> ระบบจัดการหลังบ้าน</h2>
        <table>
            <thead><tr><th>ชื่อแม่บ้าน</th><th>สถานะ</th><th>ชั่วโมงรวมเดือนนี้</th><th>จัดการ</th></tr></thead>
            <tbody id="maidList"></tbody>
        </table>
    </div>

    <div id="maidModal" class="modal">
        <div class="modal-content">
            <span style="float:right; cursor:pointer; font-size:24px;" onclick="closeModal()">×</span>
            <h2 id="modalMaidName">ตารางงาน</h2>
            <div id='calendar'></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCTWK2HDu1QPn54YJMaTmJ5Xk8MLis3PAU", databaseURL: "https://mastermaid-ubon-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let calendar;

        // ดึงรายชื่อแม่บ้าน
        db.ref('maids').on('value', (snap) => {
            const maids = snap.val();
            const list = document.getElementById('maidList');
            list.innerHTML = '';
            for(let id in maids) {
                list.innerHTML += `<tr>
                    <td><span class="maid-name" onclick="openProfile('${id}', '${maids[id].name}')">${maids[id].name}</span></td>
                    <td>${maids[id].status}</td>
                    <td>${maids[id].total_hours || 0} ชม.</td>
                    <td><button onclick="db.ref('maids/${id}').update({status:'Available'})">คืนค่าว่าง</button></td>
                </tr>`;
            }
        });

        function openProfile(maidId, maidName) {
            document.getElementById('maidModal').style.display = 'block';
            document.getElementById('modalMaidName').innerText = "ตารางงาน: " + maidName;
            
            db.ref('bookings').orderByChild('maid_id').equalTo(maidId).once('value', (snap) => {
                const jobs = snap.val() || {};
                let events = [];
                for(let key in jobs) {
                    events.push({ title: jobs[key].name, start: jobs[key].date + "T" + jobs[key].start_time.padStart(2, '0') + ":00:00" });
                }
                if(calendar) calendar.destroy();
                calendar = new FullCalendar.Calendar(document.getElementById('calendar'), { initialView: 'dayGridMonth', locale: 'th', events: events });
                calendar.render();
            });
        }
        function closeModal() { document.getElementById('maidModal').style.display = 'none'; }
    </script>
</body>
</html>
