<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Maid | CEO Dashboard</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --dark: #0A1931; --navy: #1A2F4F; --green: #28a745; --blue: #3498db; --gray: #888; }
        body { font-family: 'Sarabun', sans-serif; background: var(--dark); color: white; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        
        .grid-container { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; max-width: 1200px; margin: auto; }
        .card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; border: 1px solid var(--gold); backdrop-filter: blur(10px); }
        
        /* สไตล์ฟอร์ม */
        h3 { color: var(--gold); margin-top: 0; display: flex; align-items: center; gap: 10px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid var(--gold); background: var(--navy); color: white; font-size: 16px; box-sizing: border-box; }
        .btn-send { width: 100%; background: var(--gold); color: var(--dark); padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .btn-send:hover { background: #f1c40f; transform: translateY(-2px); }

        /* สไตล์ตารางสถานะแม่บ้าน */
        .staff-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .staff-card { background: var(--navy); padding: 15px; border-radius: 12px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; }

        /* รายการงาน */
        .job-item { background: rgba(255,255,255,0.08); padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid var(--gold); }
        .price-tag { background: var(--green); color: white; padding: 2px 8px; border-radius: 5px; font-size: 12px; float: right; }

        @media (max-width: 800px) { .grid-container { grid-template-columns: 1fr; } }
    </style>
</head>

        <h1>👑 Master Maid CEO Control</h1>

            </select>
