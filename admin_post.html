<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Maid | CEO Dashboard</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --dark: #0A1931; --navy: #1A2F4F; --green: #28a745; --blue: #3498db; --red: #dc3545; --gray: #888; }
        body { font-family: 'Sarabun', sans-serif; background: var(--dark); color: white; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid var(--gold); padding-bottom: 15px; }
        
        .grid-container { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; max-width: 1200px; margin: auto; }
        .card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; border: 1px solid var(--gold); backdrop-filter: blur(10px); }
        
        h3 { color: var(--gold); margin-top: 0; display: flex; align-items: center; gap: 10px; }
        input, select { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid var(--gold); background: var(--navy); color: white; font-size: 16px; box-sizing: border-box; }
        
        .btn-send { width: 100%; background: var(--gold); color: var(--dark); padding: 18px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .btn-send:hover { background: #f1c40f; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(212,175,55,0.3); }

        /* สไตล์ตารางสถานะแม่บ้าน */
        .staff-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 12px; }
        .staff-card { background: var(--navy); padding: 15px; border-radius: 12px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; margin-bottom: 5px; margin-left: auto; }
        
        /* ปุ่มควบคุมระยะไกล */
        .btn-remote { padding: 4px 10px; border-radius: 8px; font-size: 12px; cursor: pointer; transition: 0.3s; font-weight: bold; border: 1px solid transparent; }
        .btn-on { background: rgba(40, 167, 69, 0.1); color: var(--green); border-color: var(--green); }
        .btn-on:hover { background: var(--green); color: white; }
        .btn-off { background: rgba(220, 53, 69, 0.1); color: #ff6b6b; border-color: var(--red); }
        .btn-off:hover { background: var(--red); color: white; }

        /* งานกองกลาง */
        .job-item { background: rgba(255,255,255,0.08); padding: 15px; border-radius: 12px; margin-bottom: 12px; border-left: 5px solid var(--gold); position: relative; }
        .price-tag { background: var(--green); color: white; padding: 4px 10px; border-radius: 8px; font-size: 14px; font-weight: bold; position: absolute; top: 15px; right: 15px; }

        @media (max-width: 900px) { .grid-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="header">
        <h1>👑 Master Maid CEO Control</h1>
        <p style="color: var(--gold); margin: 0;">ระบบจัดการแม่บ้าน 10 ท่าน และควบคุมสถานะระยะไกล</p>
    </div>

    <div class="grid-container">
        
        <div class="card">
            <h3>🚀 จ่ายงานด่วนเจาะจงคน</h3>
            <label>เลือกแม่บ้าน:</label>
            <select id="targetMaid">
                <option value="พี่เอ (MM01)">พี่เอ (MM01)</option>
                <option value="พี่บี (MM02)">พี่บี (MM02)</option>
                <option value="พี่ซี (MM03)">พี่ซี (MM03)</option>
                <option value="พี่ดี (MM04)">พี่ดี (MM04)</option>
                <option value="พี่อี (MM05)">พี่อี (MM05)</option>
                <option value="พี่เอฟ (MM06)">พี่เอฟ (MM06)</option>
                <option value="พี่กิ๊ก (MM07)">พี่กิ๊ก (MM07)</option>
                <option value="พี่แก้ว (MM08)">พี่แก้ว (MM08)</option>
                <option value="พี่เกด (MM09)">พี่เกด (MM09)</option>
                <option value="พี่ก้อย (MM10)">พี่ก้อย (MM10)</option>
            </select>
            
            <label>รายละเอียดลูกค้า/สถานที่:</label>
            <input type="text" id="jobDesc" placeholder="ระบุชื่อลูกค้าและสถานที่">
            
            <button class="btn-send" onclick="assignJob()">🚀 ส่งงานเดี๋ยวนี้</button>
        </div>

        <div class="card">
            <h3>👷 สถานะทีมงาน (Real-time)</h3>
            <div id="staffStatusArea" class="staff-list">
                </div>
        </div>

        <div class="card" style="grid-column: span 1.5;">
            <h3>📋 งานรอกดรับ (Public Jobs)</h3>
            <div id="publicJobArea">
                <p style="color: #666; text-align: center;">ไม่มีงานค้างในระบบ</p>
            </div>
        </div>

    </div>

<script>
    // --- 1. ตั้งค่า Firebase ---
    const firebaseConfig = { 
        apiKey: "AIzaSyCTWK2HDu1QPn54YJMaTmJ5Xk8MLis3PAU", 
        databaseURL: "https://mastermaid-ubon-default-rtdb.asia-southeast1.firebasedatabase.app", 
        projectId: "mastermaid-ubon" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const allStaff = [
        "พี่เอ (MM01)", "พี่บี (MM02)", "พี่ซี (MM03)", "พี่ดี (MM04)", "พี่อี (MM05)", 
        "พี่เอฟ (MM06)", "พี่กิ๊ก (MM07)", "พี่แก้ว (MM08)", "พี่เกด (MM09)", "พี่ก้อย (MM10)"
    ];

    // --- 2. ฟังก์ชันจ่ายงานด่วน ---
    function assignJob() {
        const maidName = document.getElementById('targetMaid').value;
        const detail = document.getElementById('jobDesc').value;
        if(!detail) return alert("❌ กรุณากรอกรายละเอียดงาน");

        db.ref('personal_jobs/' + maidName).set({
            customer: detail,
            status: "waiting",
            postedAt: Date.now()
        }).then(() => {
            alert("✅ ส่งงานด่วนให้ " + maidName + " แล้ว!");
            document.getElementById('jobDesc').value = "";
        });
    }

    // --- 3. ฟังก์ชันสั่งการระยะไกล (Remote Control) ---
    function remoteToggle(maidName, action) {
        const statusText = action === 'on' ? "available" : "offline";
        const confirmMsg = action === 'on' ? `สั่งเปิดระบบ Online ให้ ${maidName}?` : `สั่งระงับ/ปิดระบบ ของ ${maidName}?`;

        if(confirm(confirmMsg)) {
            // อัปเดตสถานะใน Firebase
            db.ref('maid_status/' + maidName).set(statusText);
            // ส่งสัญญาณไปยังเครื่องแม่บ้าน
            db.ref('personal_jobs/' + maidName).set({
                action: action === 'on' ? "force_online" : "force_reload",
                timestamp: Date.now()
            });
            alert(`ดำเนินการเรียบร้อย`);
        }
    }

    // --- 4. ดักฟังสถานะแม่บ้าน (Real-time) ---
    db.ref('maid_status').on('value', snap => {
        const statuses = snap.val() || {};
        const area = document.getElementById('staffStatusArea');
        area.innerHTML = "";
        
        allStaff.forEach(name => {
            const currentStatus = statuses[name] || "offline";
            let color = "var(--gray)";
            let label = "Offline";

            if(currentStatus === "available") { color = "var(--green)"; label = "ว่าง (Online)"; }
            else if(currentStatus === "working") { color = "var(--gold)"; label = "กำลังทำงาน"; }
            else if(currentStatus === "traveling") { color = "var(--blue)"; label = "เดินทาง"; }

            area.innerHTML += `
                <div class="staff-card">
                    <div style="text-align:left;">
                        <b style="font-size:13px;">${name}</b><br>
                        <small style="color:${color}">${label}</small>
                    </div>
                    <div style="text-align:right;">
                        <div class="status-dot" style="background:${color}"></div>
                        <div style="display:flex; gap:5px; margin-top:5px;">
                            ${currentStatus === 'offline' ? 
                                `<button class="btn-remote btn-on" onclick="remoteToggle('${name}', 'on')">เปิด</button>` : 
                                `<button class="btn-remote btn-off" onclick="remoteToggle('${name}', 'off')">ระงับ</button>`
                            }
                        </div>
                    </div>
                </div>
            `;
        });
    });

    // --- 5. ดักฟังงานกองกลาง ---
    db.ref('available_jobs').on('value', snap => {
        const jobs = snap.val();
        const area = document.getElementById('publicJobArea');
        area.innerHTML = "";
        if(!jobs) {
            area.innerHTML = "<p style='color: #888; text-align: center;'>📭 ไม่มีงานค้างในขณะนี้</p>";
            return;
        }
        for (let id in jobs) {
            if(jobs[id].status === "available") {
                area.innerHTML += `
                    <div class="job-item">
                        <span class="price-tag">${jobs[id].price} บาท</span>
                        <b style="color:var(--gold); font-size:18px;">👤 คุณ${jobs[id].title}</b><br>
                        🏠 ${jobs[id].property_type} | ⏰ ${jobs[id].booking_time}<br>
                        📍 สถานที่: ${jobs[id].detail}
                    </div>
                `;
            }
        }
    });
</script>

</body>
</html>
