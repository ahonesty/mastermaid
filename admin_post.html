<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Master Maid | จัดสรรงาน</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.10.1/main.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.10.1/main.min.js'></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #f4f7f6; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        .pending-row { background: #fffdf5; border-left: 5px solid #D4AF37; }
        .btn { background: #0A1931; color: white; padding: 8px 15px; border: none; border-radius: 8px; cursor: pointer; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: white; margin: 2% auto; padding: 25px; border-radius: 20px; width: 90%; max-width: 1000px; position: relative; }
    </style>
</head>
<body>
    <div class="card">
        <h2>จองใหม่ (รอจัดสรร)</h2>
        <table>
            <thead><tr><th>วัน/เวลา</th><th>ข้อมูลลูกค้า/บ้าน</th><th>แผนที่</th><th>จัดงาน</th></tr></thead>
            <tbody id="pendingList"></tbody>
        </table>
    </div>
    <div class="card">
        <h2>จัดการแม่บ้าน</h2>
        <table>
            <thead><tr><th>ชื่อแม่บ้าน</th><th>สถานะ</th><th>ตารางงาน</th></tr></thead>
            <tbody id="maidList"></tbody>
        </table>
    </div>
    <div id="calendarModal" class="modal">
        <div class="modal-content"><span style="float:right; cursor:pointer;" onclick="closeModal()">×</span><h2 id="modalMaidName">ตารางงาน</h2><div id='calendar'></div></div>
    </div>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyCTWK2HDu1QPn54YJMaTmJ5Xk8MLis3PAU", databaseURL: "https://mastermaid-ubon-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let calendar, maidOptions = '<option value="">-- เลือกแม่บ้าน --</option>';

        db.ref('maid_status').on('value', (snap) => {
            const maids = snap.val();
            const list = document.getElementById('maidList');
            list.innerHTML = ''; maidOptions = '<option value="">-- เลือกแม่บ้าน --</option>';
            for(let id in maids) {
                maidOptions += `<option value="${id}">${maids[id].name}</option>`;
                list.innerHTML += `<tr><td><b>${maids[id].name}</b></td><td>${maids[id].status}</td><td><button class="btn" onclick="openProfile('${id}', '${maids[id].name}')">ดูปฏิทิน</button></td></tr>`;
            }
        });

        db.ref('job_history').on('value', (snap) => {
            const jobs = snap.val();
            const list = document.getElementById('pendingList');
            list.innerHTML = '';
            for(let key in jobs) {
                const j = jobs[key];
                if(j.maid_id === "Pending") {
                    list.innerHTML += `<tr class="pending-row">
                        <td>${j.date}<br><b>${j.start_time}:00 - ${j.end_time || '?'}</b></td>
                        <td>${j.name} (${j.phone})<br><small>${j.home_size || 'ไม่ได้ระบุ'}</small></td>
                        <td><a href="${j.google_maps_link}" target="_blank">📍 แผนที่</a></td>
                        <td><select id="sel_${key}">${maidOptions}</select> <button class="btn" onclick="assign('${key}')">ยืนยัน</button></td>
                    </tr>`;
                }
            }
        });

        function assign(key) {
            const mId = document.getElementById('sel_'+key).value;
            if(!mId) return alert("เลือกแม่บ้านก่อน");
            db.ref('job_history/'+key).update({ maid_id: mId });
        }

        function openProfile(mId, mName) {
            document.getElementById('calendarModal').style.display = 'block';
            document.getElementById('modalMaidName').innerText = mName;
            db.ref('job_history').orderByChild('maid_id').equalTo(mId).once('value', (snap) => {
                const jobs = snap.val() || {};
                let evs = [];
                for(let k in jobs) evs.push({ title: jobs[k].name, start: jobs[k].date+"T"+jobs[k].start_time.padStart(2,'0')+":00:00" });
                if(calendar) calendar.destroy();
                calendar = new FullCalendar.Calendar(document.getElementById('calendar'), { initialView: 'dayGridMonth', events: evs });
                calendar.render();
            });
        }
        function closeModal() { document.getElementById('calendarModal').style.display = 'none'; }
    </script>
</body>
</html>
