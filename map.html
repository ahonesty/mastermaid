<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Control Panel | Master Maid</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD7Qqf1Z9KQBuvipDzgIc5laJLz9SiOBH8&language=th"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0A1931; --gold: #D4AF37; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Sarabun', sans-serif; }
        #map { width: 100%; height: 100vh; }
        
        .control-panel {
            position: absolute; top: 20px; left: 20px;
            background: white; padding: 20px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 10;
            width: 280px; border-top: 6px solid var(--gold);
        }
        .status-item { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; font-size: 14px; }
        .indicator { width: 14px; height: 14px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.2); }
        h2 { margin: 0 0 15px 0; color: var(--primary); font-size: 18px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    </style>
</head>
<body>

    <div class="control-panel">
        <h2>🛰️ ระบบติดตาม Real-time</h2>
        <div class="status-item">
            <div class="indicator" style="background: #0A1931;"></div> 
            <span>แม่บ้าน (น้ำเงินเข้ม + ชื่อ)</span>
        </div>
        <div class="status-item">
            <div class="indicator" style="background: #D4AF37;"></div> 
            <span>งานที่รอรับ (สีทอง)</span>
        </div>
        <div id="activeCount" style="margin-top: 15px; font-size: 12px; color: #666;">
            กำลังโหลดข้อมูลพนักงาน...
        </div>
    </div>

    <div id="map"></div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCTWK2HDu1QPn54YJMaTmJ5Xk8MLis3PAU", 
        databaseURL: "https://mastermaid-ubon-default-rtdb.asia-southeast1.firebasedatabase.app" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let map;
    let maidMarkers = {}; // เก็บหมุดแม่บ้าน
    let jobMarkers = {};  // เก็บหมุดงานลูกค้า

    function initMap() {
        const ubon = { lat: 15.2294, lng: 104.8564 };
        map = new google.maps.Map(document.getElementById("map"), {
            center: ubon,
            zoom: 13,
            mapTypeControl: false,
            styles: [
                { "featureType": "poi", "stylers": [{ "visibility": "off" }] } // ปิดสถานที่ทั่วไปเพื่อให้เห็นหมุดชัด
            ]
        });

        // --- 1. ติดตามพิกัดแม่บ้าน 10 คน ---
        db.ref('maids_location').on('value', (snap) => {
            const data = snap.val();
            if(!data) return;
            
            let onlineCount = 0;
            for(let id in data) {
                onlineCount++;
                const pos = { lat: data[id].lat, lng: data[id].lng };
                
                if(maidMarkers[id]) {
                    maidMarkers[id].setPosition(pos);
                } else {
                    maidMarkers[id] = new google.maps.Marker({
                        position: pos,
                        map: map,
                        label: {
                            text: data[id].name, // ชื่อบนหัวหมุด
                            color: "#0A1931",
                            fontWeight: "bold",
                            fontSize: "12px"
                        },
                        icon: {
                            path: google.maps.SymbolPath.CIRCLE,
                            fillColor: "#0A1931", // สีน้ำเงินเข้มตาม driver.html
                            fillOpacity: 1,
                            strokeColor: "#FFFFFF",
                            strokeWeight: 2,
                            scale: 8
                        }
                    });
                }
            }
            document.getElementById('activeCount').innerText = `พนักงานออนไลน์ขณะนี้: ${onlineCount} ท่าน`;
        });

        // --- 2. แสดงพิกัดงานจองใหม่ (หมุดสีทอง) ---
        db.ref('available_jobs').on('value', (snap) => {
            const jobs = snap.val();
            // ล้างหมุดงานเก่า
            for(let id in jobMarkers) jobMarkers[id].setMap(null);
            jobMarkers = {};

            if(!jobs) return;
            for(let id in jobs) {
                if(jobs[id].status === "available") {
                    // ดึงพิกัดจาก URL (0{lat},lng)
                    const coords = jobs[id].location_url.match(/0{([\d.]+)},([\d.]+)/);
                    if(coords) {
                        const pos = { lat: parseFloat(coords[1]), lng: parseFloat(coords[2]) };
                        jobMarkers[id] = new google.maps.Marker({
                            position: pos,
                            map: map,
                            icon: {
                                url: "http://maps.google.com/mapfiles/ms/icons/red-dot.png", // หมุดสีทอง/แดง
                                scaledSize: new google.maps.Size(35, 35)
                            },
                            animation: google.maps.Animation.DROP
                        });

                        const info = new google.maps.InfoWindow({
                            content: `<div style="padding:5px;"><b>คุณ ${jobs[id].title}</b><br>โทร: ${jobs[id].phone}<br>${jobs[id].booking_time} น.</div>`
                        });
                        jobMarkers[id].addListener("click", () => info.open(map, jobMarkers[id]));
                    }
                }
            }
        });
    }

    google.maps.event.addDomListener(window, 'load', initMap);
</script>
</body>
</html>
