<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Control Panel | Master Maid</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD7Qqf1Z9KQBuvipDzgIc5laJLz9SiOBH8&language=th"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #0A1931; --gold: #D4AF37; --bg: #F4F7F6; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Sarabun', sans-serif; overflow: hidden; background: var(--bg); }
        #map { width: 100%; height: 100vh; }
        
        /* Sidebar รายชื่อแม่บ้าน */
        .maid-sidebar {
            position: absolute; top: 20px; right: 20px;
            background: white; width: 280px; max-height: 85vh;
            border-radius: 25px; box-shadow: -5px 5px 25px rgba(0,0,0,0.2);
            z-index: 10; overflow-y: auto; border-top: 6px solid var(--primary);
        }
        .sidebar-header { padding: 20px; background: var(--primary); color: white; position: sticky; top: 0; z-index: 11; text-align: center; }
        .maid-item { 
            display: flex; align-items: center; padding: 15px; 
            border-bottom: 1px solid #eee; cursor: pointer; transition: 0.2s;
        }
        .maid-item:hover { background: #f0f4f8; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 15px; border: 2px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.1); }
        .online { background: #28a745; box-shadow: 0 0 8px #28a745; }
        .offline { background: #ccc; }
        .maid-info { flex-grow: 1; font-size: 14px; color: var(--primary); font-weight: bold; }

        /* แผงควบคุมฝั่งซ้าย */
        .legend-panel {
            position: absolute; top: 20px; left: 20px;
            background: white; padding: 15px; border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15); z-index: 10;
            width: 200px; border-top: 5px solid var(--gold);
        }
        .legend-item { display: flex; align-items: center; gap: 10px; font-size: 13px; margin-top: 8px; }
    </style>
</head>
<body>

    <div class="legend-panel">
        <h3 style="margin:0; font-size:16px; color:var(--primary);">🛰️ ศูนย์ควบคุมกลาง</h3>
        <div class="legend-item"><div style="width:12px; height:12px; border-radius:50%; background:#0A1931;"></div> แม่บ้าน (Online)</div>
        <div class="legend-item"><div style="width:12px; height:12px; border-radius:50%; background:#D4AF37;"></div> งานรอรับ (Available)</div>
        <hr style="border:0; border-top:1px solid #eee; margin:10px 0;">
        <small style="color:#888;">คลิกชื่อแม่บ้านเพื่อติดตามพิกัด</small>
    </div>

    <div class="maid-sidebar">
        <div class="sidebar-header">
            <h3 style="margin:0;"><i class="fas fa-satellite-dish"></i> Live Tracking</h3>
        </div>
        <div id="maidList"></div>
    </div>

    <div id="map"></div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCTWK2HDu1QPn54YJMaTmJ5Xk8MLis3PAU", 
        databaseURL: "https://mastermaid-ubon-default-rtdb.asia-southeast1.firebasedatabase.app" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const allMaids = [
        "พี่เอ (MM01)", "พี่บี (MM02)", "พี่ซี (MM03)", "พี่ดี (MM04)", "พี่อี (MM05)",
        "พี่เอฟ (MM06)", "พี่กิ๊ก (MM07)", "พี่แก้ว (MM08)", "พี่เกด (MM09)", "พี่ก้อย (MM10)"
    ];

    let map, maidMarkers = {}, jobMarkers = {};

    function initMap() {
        const ubon = { lat: 15.2294, lng: 104.8564 };
        map = new google.maps.Map(document.getElementById("map"), {
            center: ubon, zoom: 13, mapTypeControl: false,
            styles: [{ "featureType": "poi", "stylers": [{ "visibility": "off" }] }]
        });

        renderMaidList();
        syncData();
    }

    function renderMaidList() {
        const listDiv = document.getElementById('maidList');
        listDiv.innerHTML = allMaids.map(name => `
            <div class="maid-item" onclick="focusMaid('${name}')">
                <div class="status-dot offline" id="dot-${name}"></div>
                <div class="maid-info">${name}</div>
                <i class="fas fa-map-marker-alt" style="color:#0A1931; opacity:0.2;"></i>
            </div>
        `).join('');
    }

    function syncData() {
        // 1. ดึงพิกัดและสถานะแม่บ้าน (พร้อมระบบลบพิกัดที่ค้าง)
        db.ref('maids_location').on('value', (snap) => {
            const locations = snap.val() || {};
            
            // --- ขั้นตอนแก้ไฟค้าง: ลบหมุดที่ไม่มีข้อมูลใน Firebase ออกจากแผนที่ ---
            for (let name in maidMarkers) {
                if (!locations[name]) {
                    maidMarkers[name].setMap(null); // เอาออกจากแผนที่
                    delete maidMarkers[name];      // ลบจากตัวแปร
                    if(document.getElementById(`dot-${name}`)) {
                        document.getElementById(`dot-${name}`).className = "status-dot offline";
                    }
                }
            }

            // --- อัปเดต/สร้างหมุดใหม่ ---
            for(let id in locations) {
                const data = locations[id];
                const pos = { lat: parseFloat(data.lat), lng: parseFloat(data.lng) };
                
                // เปลี่ยนไฟสถานะเป็นออนไลน์
                if(document.getElementById(`dot-${data.name}`)) {
                    document.getElementById(`dot-${data.name}`).className = "status-dot online";
                }

                if(maidMarkers[data.name]) {
                    maidMarkers[data.name].setPosition(pos);
                } else {
                    maidMarkers[data.name] = new google.maps.Marker({
                        position: pos, map: map,
                        label: { text: data.name, color: "#0A1931", fontWeight: "bold", fontSize: "11px" },
                        icon: {
                            path: google.maps.SymbolPath.CIRCLE,
                            fillColor: "#0A1931", fillOpacity: 1, strokeColor: "#fff", strokeWeight: 2, scale: 8
                        }
                    });
                }
            }
        });

        // 2. ดึงพิกัดบ้านลูกค้า (หมุดสีทอง)
        db.ref('available_jobs').on('value', (snap) => {
            const jobs = snap.val();
            for(let id in jobMarkers) jobMarkers[id].setMap(null);
            jobMarkers = {};

            if(!jobs) return;
            for(let id in jobs) {
                if(jobs[id].status === "available") {
                    const url = jobs[id].location_url;
                    const match = url.match(/(-?\d+\.\d+)\s*,\s*(-?\d+\.\d+)/);
                    
                    if(match) {
                        const pos = { lat: parseFloat(match[1]), lng: parseFloat(match[2]) };
                        jobMarkers[id] = new google.maps.Marker({
                            position: pos, map: map,
                            icon: {
                                url: "http://googleusercontent.com/maps.google.com/7", // หมุดสีทอง
                                scaledSize: new google.maps.Size(45, 45)
                            }
                        });
                        const info = new google.maps.InfoWindow({
                            content: `<div style="padding:5px;"><b>คุณ ${jobs[id].title}</b><br>${jobs[id].booking_time} น.</div>`
                        });
                        jobMarkers[id].addListener("click", () => info.open(map, jobMarkers[id]));
                    }
                }
            }
        });
    }

    // ฟังก์ชันคลิกชื่อแล้วซูมไปหา
    window.focusMaid = function(name) {
        if (maidMarkers[name]) {
            const pos = maidMarkers[name].getPosition();
            map.setZoom(17);
            map.panTo(pos);
            maidMarkers[name].setAnimation(google.maps.Animation.BOUNCE);
            setTimeout(() => maidMarkers[name].setAnimation(null), 2000);
        } else {
            alert(name + " ยังไม่ได้ Online หรืออยู่นอกพื้นที่รับสัญญาณ");
        }
    }

    google.maps.event.addDomListener(window, 'load', initMap);
</script>
</body>
</html>
