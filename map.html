<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Tracking | Master Maid Thailand</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD7Qqf1Z9KQBuvipDzgIc5laJLz9SiOBH8&libraries=places&language=th"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #0A1931; --gold: #D4AF37; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Sarabun', sans-serif; }
        #map { width: 100%; height: 100vh; }
        
        .map-overlay {
            position: absolute; top: 20px; left: 20px;
            background: white; padding: 15px; border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 10;
            max-width: 250px; border-top: 5px solid var(--gold);
        }
        .legend-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 13px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
    </style>
</head>
<body>

    <div class="map-overlay">
        <h3 style="margin: 0 0 10px 0; color: var(--primary);">📡 Master Tracking</h3>
        <div class="legend-item"><div class="dot" style="background: blue;"></div> แม่บ้าน (Online)</div>
        <div class="legend-item"><div class="dot" style="background: red;"></div> งานจองที่รอกดรับ</div>
        <hr border="0" style="border-top: 1px solid #eee;">
        <small style="color: #666;">อัปเดตพิกัดแบบ Real-time</small>
    </div>

    <div id="map"></div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCTWK2HDu1QPn54YJMaTmJ5Xk8MLis3PAU", 
        databaseURL: "https://mastermaid-ubon-default-rtdb.asia-southeast1.firebasedatabase.app" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let map;
    let maidMarkers = {}; // เก็บหมุดแม่บ้าน
    let jobMarkers = {};  // เก็บหมุดบ้านลูกค้า

    function initMap() {
        const ubon = { lat: 15.2294, lng: 104.8564 };
        map = new google.maps.Map(document.getElementById("map"), {
            center: ubon,
            zoom: 13,
            mapTypeControl: false,
            streetViewControl: false
        });

        // --- 1. ดึงพิกัดแม่บ้าน (สีน้ำเงิน) ---
        db.ref('maids_location').on('value', (snap) => {
            const data = snap.val();
            if(!data) return;
            for(let id in data) {
                const pos = { lat: data[id].lat, lng: data[id].lng };
                if(maidMarkers[id]) {
                    maidMarkers[id].setPosition(pos);
                } else {
                    maidMarkers[id] = new google.maps.Marker({
                        position: pos, map: map, 
                        title: data[id].name,
                        icon: 'http://maps.google.com/mapfiles/ms/icons/blue-dot.png'
                    });
                }
            }
        });

        // --- 2. ดึงพิกัดบ้านลูกค้าจาก available_jobs (สีแดง) ---
        db.ref('available_jobs').on('value', (snap) => {
            const jobs = snap.val();
            
            // ล้างหมุดงานจองเก่าก่อนอัปเดตใหม่
            for(let id in jobMarkers) jobMarkers[id].setMap(null);
            jobMarkers = {};

            if(!jobs) return;
            for(let id in jobs) {
                if(jobs[id].status === "available") {
                    // ดึงพิกัดจาก URL (ดึงเลข lat, lng ออกมา)
                    const url = jobs[id].location_url;
                    const coords = url.match(/0{([\d.]+)},([\d.]+)/);
                    if(coords) {
                        const pos = { lat: parseFloat(coords[1]), lng: parseFloat(coords[2]) };
                        jobMarkers[id] = new google.maps.Marker({
                            position: pos, map: map,
                            title: "ลูกค้า: " + jobs[id].title,
                            icon: 'http://maps.google.com/mapfiles/ms/icons/red-dot.png'
                        });
                        
                        // คลิกดูรายละเอียดงานเบื้องต้น
                        const info = new google.maps.InfoWindow({ content: `<b>คุณ ${jobs[id].title}</b><br>${jobs[id].property_type}` });
                        jobMarkers[id].addListener("click", () => info.open(map, jobMarkers[id]));
                    }
                }
            }
        });
    }

    google.maps.event.addDomListener(window, 'load', initMap);
</script>
</body>
</html>
