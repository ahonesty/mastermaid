<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Maid | Driver Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; text-align: center; padding: 20px; background: #0A1931; color: white; margin: 0; }
        .card { background: rgba(255,255,255,0.1); padding: 25px; border-radius: 20px; border: 1px solid #D4AF37; max-width: 380px; margin: 20px auto; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .btn { width: 100%; padding: 20px; border-radius: 15px; border: none; font-size: 20px; font-weight: bold; cursor: pointer; margin: 10px 0; transition: 0.3s; display: block; }
        #startBtn { background: #D4AF37; color: #0A1931; }
        #arriveBtn { background: #28a745; color: white; display: none; }
        #finishBtn { background: #dc3545; color: white; display: none; }
        .timer-display { font-size: 42px; font-weight: bold; color: #D4AF37; margin: 15px 0; display: none; }
        
        /* สไตล์หน้าต่างยืนยัน (Custom Modal) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #0A1931; padding: 30px; border-radius: 20px; border: 2px solid #D4AF37; width: 80%; max-width: 300px; }
        .btn-confirm { background: #28a745; color: white; margin-bottom: 10px; }
        .btn-cancel { background: #6c757d; color: white; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="color: #D4AF37;">MASTER MAID</h2>
        <p>ระบบบันทึกเวลาทำงาน</p>
        <hr style="border: 0.1px solid rgba(212,175,55,0.2); margin: 15px 0;">

        <div id="timer" class="timer-display">00:00:00</div>
        
        <button id="startBtn" class="btn" onclick="startTracking()">🚀 เริ่มเดินทาง</button>
        <button id="arriveBtn" class="btn" onclick="arriveAtDestination()">📍 ถึงที่หมาย / เริ่มงาน</button>
        <button id="finishBtn" class="btn" onclick="showConfirmModal()">🏁 จบงานและส่งรายงาน</button>
    </div>

    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <h3 style="color: #D4AF37;">ยืนยันการจบงาน?</h3>
            <p>เมื่อกดตกลง ระบบจะส่งเวลาและพิกัดให้ CEO ทันที</p>
            <button class="btn btn-confirm" onclick="finishJob()">✅ ตกลง จบงาน</button>
            <button class="btn btn-cancel" onclick="hideConfirmModal()">❌ ยกเลิก</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCTWK2HDu1QPn54YJMaTmJ5Xk8MLis3PAU",
            databaseURL: "https://mastermaid-ubon-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "mastermaid-ubon",
            appId: "1:272279135131:web:18a1d12073e601688c773e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const webhookURL = "https://hook.us2.make.com/8ic5xqhrsfy8dbfqk6nkdhzaglv4qp23"; 

        let watchId = null, timerInterval = null, seconds = 0;
        let jobDate = "", jobStartTime = "";

        function startTracking() {
            document.getElementById('startBtn').style.display = "none";
            document.getElementById('arriveBtn').style.display = "block";
            watchId = navigator.geolocation.watchPosition((pos) => {
                db.ref('tracking/maid_01').set({ 
                    lat: pos.coords.latitude, lng: pos.coords.longitude, status: "กำลังเดินทาง" 
                });
            }, null, { enableHighAccuracy: true });
        }

        function arriveAtDestination() {
            if (watchId) navigator.geolocation.clearWatch(watchId);
            db.ref('tracking/maid_01').remove();
            
            const now = new Date();
            jobDate = now.toLocaleDateString('th-TH');
            jobStartTime = now.toLocaleTimeString('th-TH');

            document.getElementById('arriveBtn').style.display = "none";
            document.getElementById('finishBtn').style.display = "block";
            document.getElementById('timer').style.display = "block";

            // เริ่มนับเวลา (ซึ่งจะไม่หยุดเดินแม้จะเปิด Modal)
            timerInterval = setInterval(() => {
                seconds++;
                let h = Math.floor(seconds/3600).toString().padStart(2,'0');
                let m = Math.floor((seconds%3600)/60).toString().padStart(2,'0');
                let s = (seconds%60).toString().padStart(2,'0');
                document.getElementById('timer').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        function showConfirmModal() {
            document.getElementById('confirmModal').style.display = "flex";
        }

        function hideConfirmModal() {
            document.getElementById('confirmModal').style.display = "none";
        }

        async function finishJob() {
            hideConfirmModal();
            const duration = document.getElementById('timer').innerText;
            clearInterval(timerInterval); // หยุดเวลาเฉพาะตอนที่กด "ตกลง" จริงๆ เท่านั้น
            
            document.getElementById('finishBtn').disabled = true;
            document.getElementById('finishBtn').innerText = "⏳ กำลังส่งข้อมูล...";

            const finishTime = new Date().toLocaleTimeString('th-TH');

            const sendReport = async (locUrl) => {
                try {
                    await fetch(webhookURL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            maid_name: "แม่บ้าน 01",
                            work_date: jobDate,
                            start_at: jobStartTime,
                            finished_at: finishTime,
                            duration: duration,
                            location_url: locUrl || "ไม่ระบุพิกัด"
                        })
                    });
                    alert("✅ ส่งรายงานสำเร็จ!");
                    location.reload();
                } catch (e) {
                    alert("❌ ส่งไม่สำเร็จ กรุณาลองใหม่");
                    location.reload();
                }
            };

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => sendReport(`https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`),
                    () => sendReport(),
                    { enableHighAccuracy: true, timeout: 5000 }
                );
            } else {
                sendReport();
            }
        }
    </script>
</body>
</html>
