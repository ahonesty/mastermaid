<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Maid | ระบบแม่บ้าน</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; text-align: center; padding: 40px 20px; background: #0A1931; color: white; margin: 0; }
        .card { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 25px; border: 1px solid #D4AF37; max-width: 400px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { width: 100%; padding: 20px; border-radius: 15px; border: none; font-size: 20px; font-weight: bold; cursor: pointer; margin: 10px 0; transition: 0.3s; }
        .btn-start { background: #D4AF37; color: #0A1931; }
        .btn-arrive { background: #28a745; color: white; display: none; }
        .btn-finish { background: #dc3545; color: white; display: none; }
        .timer-display { font-size: 48px; font-weight: bold; color: #D4AF37; margin: 20px 0; display: none; }
        .status-badge { display: inline-block; padding: 8px 15px; border-radius: 50px; background: #06C755; color: white; font-size: 14px; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="color: #D4AF37;">MASTER MAID</h2>
        <p>ระบบบริหารจัดการงานแม่บ้าน</p>
        <hr style="border: 0.1px solid rgba(212,175,55,0.2); margin: 20px 0;">

        <div id="status" class="status-badge">🟢 กำลังแชร์ตำแหน่ง...</div>
        <div id="timer" class="timer-display">00:00:00</div>
        
        <button id="startBtn" class="btn btn-start" onclick="startTracking()">🚀 เริ่มเดินทางไปหาลูกค้า</button>
        <button id="arriveBtn" class="btn btn-arrive" onclick="arriveAtDestination()">📍 ถึงที่หมายแล้ว / เริ่มงาน</button>
        <button id="finishBtn" class="btn btn-finish" onclick="finishJob()">🏁 จบงานและส่งรายงาน</button>
        
        <p id="info" style="font-size: 13px; opacity: 0.7; margin-top: 20px;">* โปรดเปิด GPS และหน้าจอค้างไว้ขณะเดินทาง *</p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCTWK2HDu1QPn54YJMaTmJ5Xk8MLis3PAU",
            databaseURL: "https://mastermaid-ubon-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "mastermaid-ubon",
            appId: "1:272279135131:web:18a1d12073e601688c773e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let watchId = null;
        let timerInterval = null;
        let seconds = 0;

        // 1. กดเมื่อเริ่มเดินทาง
        function startTracking() {
            if (navigator.geolocation) {
                document.getElementById('startBtn').style.display = "none";
                document.getElementById('arriveBtn').style.display = "block";
                document.getElementById('status').style.display = "inline-block";

                watchId = navigator.geolocation.watchPosition((pos) => {
                    db.ref('tracking/maid_01').set({
                        lat: pos.coords.latitude,
                        lng: pos.coords.longitude,
                        status: "On the way"
                    });
                }, null, { enableHighAccuracy: true });
            }
        }

        // 2. กดเมื่อถึงหน้าบ้านลูกค้า
        function arriveAtDestination() {
            if (confirm("ยืนยันว่าถึงที่หมายแล้ว? ระบบจะหยุดแชร์พิกัดและเริ่มจับเวลาทำงาน")) {
                // หยุดส่ง GPS
                if (watchId) navigator.geolocation.clearWatch(watchId);
                // ลบพิกัดออกจากแผนที่ลูกค้า
                db.ref('tracking/maid_01').remove();
                
                // สลับปุ่ม
                document.getElementById('arriveBtn').style.display = "none";
                document.getElementById('finishBtn').style.display = "block";
                document.getElementById('status').innerText = "🧹 กำลังปฏิบัติงาน...";
                document.getElementById('timer').style.display = "block";

                // เริ่มจับเวลาทำงาน
                timerInterval = setInterval(() => {
                    seconds++;
                    let h = Math.floor(seconds / 3600).toString().padStart(2, '0');
                    let m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
                    let s = (seconds % 60).toString().padStart(2, '0');
                    document.getElementById('timer').innerText = `${h}:${m}:${s}`;
                }, 1000);
            }
        }

        // 3. กดเมื่อทำความสะอาดเสร็จ
      function onFinishWork() {
    if (confirm("งานเสร็จเรียบร้อยแล้วใช่ไหม?")) {
        clearInterval(timerInterval);
        const workDuration = document.getElementById('timerDisplay').innerText;
        const finishTime = new Date().toLocaleTimeString();
        const date = new Date().toLocaleDateString();

        // 1. ส่งข้อมูลไปที่ LINE CEO (ผ่าน Make.com Webhook)
        // *** เอา URL จาก Make.com มาวางตรงนี้ ***
        const webhookURL = "https://hook.us2.make.com/xxxxxxxxxxxxxxxxx"; 

        fetch(webhookURL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                maid_name: "แม่บ้าน 01",
                work_date: date,
                duration: workDuration,
                finished_at: finishTime,
                status: "จบงานเรียบร้อย"
            })
        });

        // 2. บันทึกเข้า Firebase (เหมือนเดิม)
        db.ref('job_history').push({
            date: date,
            duration: workDuration,
            finish_time: finishTime,
            status: "Completed"
        });

        alert("ส่งรายงานจบงานและแจ้งเตือน LINE CEO สำเร็จ!\nเวลาทำงาน: " + workDuration);
        location.reload();
    }
}
    </script>
</body>
</html>
