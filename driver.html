<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Panel | Master Maid</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #D4AF37; --dark: #0A1931; --navy: #1A2F4F; }
        body { font-family: 'Sarabun', sans-serif; background: var(--dark); color: white; text-align: center; padding: 15px; margin: 0; }
        .card { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 20px; border: 1px solid var(--gold); max-width: 400px; margin: auto; backdrop-filter: blur(10px); }
        .btn { width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; margin: 10px 0; border: none; cursor: pointer; font-size: 16px; }
        select { width: 100%; padding: 15px; border-radius: 12px; background: var(--navy); color: white; border: 1px solid var(--gold); font-size: 16px; }
        
        .job-box { background: rgba(212,175,55,0.1); padding: 15px; border-radius: 15px; border: 2px solid var(--gold); margin-top: 15px; text-align: left; }
        .checklist-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 14px; }
        .checklist-item input { width: 20px; height: 20px; }
        
        .photo-section { background: #1A2F4F; padding: 10px; border-radius: 10px; margin-top: 10px; border: 1px dashed var(--gold); }
        .photo-label { display: block; font-size: 12px; color: var(--gold); margin-bottom: 5px; }
        input[type="file"] { font-size: 12px; color: #ccc; }
        
        #timer { font-size: 32px; font-weight: bold; color: var(--gold); margin: 15px 0; }
    </style>
</head>
<body>

<div class="card">
    <h3>👷 ระบบแม่บ้าน Master Maid</h3>
    
    <select id="maidSelect" onchange="initStaff()">
        <option value="">-- เลือกชื่อของคุณ --</option>
        <option value="พิมพ์ (MM01)">พี่เอ (MM01)</option>
        <option value="โจ (MM01)">พี่เอ (MM01)</option>
        <option value="อาร์ต (MM01)">พี่เอ (MM01)</option>
        <option value="พี่เอ (MM01)">พี่เอ (MM01)</option>
        <option value="พี่บี (MM02)">พี่บี (MM02)</option>
        <option value="พี่ซี (MM03)">พี่ซี (MM03)</option>
    </select>

    <button id="statusBtn" class="btn" style="background:#28a745; color:white;" onclick="toggleStatus()">ว่าง (พร้อมรับงาน)</button>

    <div id="personalJob" class="job-box" style="display:none;">
        <h4 style="margin:0; color:var(--gold);">📢 งานมอบหมายถึงคุณ!</h4>
        <p id="jobInfo" style="font-size:14px; margin:10px 0;"></p>
        <button class="btn" style="background:#28a745; color:white;" onclick="acceptJob()">✅ ตกลงรับงานนี้</button>
    </div>

    <div id="publicJobs" style="margin-top:20px; text-align:left;"></div>

    <div id="workingArea" style="display:none; margin-top:20px;">
        <div id="timer">00:00:00</div>
        
        <div class="job-box">
            <h4 style="margin:0 0 10px 0; color:var(--gold);">📋 รายการที่ต้องทำ:</h4>
            <div class="checklist-item"><input type="checkbox" id="check1"> กวาดและถูพื้นทุกห้อง</div>
            <div class="checklist-item"><input type="checkbox" id="check2"> เช็ดกระจกและระเบียง</div>
            <div class="checklist-item"><input type="checkbox" id="check3"> ล้างห้องน้ำและสุขภัณฑ์</div>
            <div class="checklist-item"><input type="checkbox" id="check4"> เก็บขยะทิ้งทั้งหมด</div>
        </div>

        <div class="photo-section">
            <span class="photo-label">📸 รูปก่อนเริ่มงาน:</span>
            <input type="file" id="photoBefore" accept="image/*" capture="camera">
            <hr style="border:0.5px solid #333; margin:10px 0;">
            <span class="photo-label">📸 รูปหลังจบงาน:</span>
            <input type="file" id="photoAfter" accept="image/*" capture="camera">
        </div>

        <button id="arriveBtn" class="btn" style="background:var(--gold); color:var(--dark);" onclick="arrive()">📍 ถึงที่หมาย / เริ่มงาน</button>
        <button id="finishBtn" class="btn" style="background:#dc3545; color:white; display:none;" onclick="finish()">🏁 จบงานและส่งรายงาน</button>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCTWK2HDu1QPn54YJMaTmJ5Xk8MLis3PAU", 
        databaseURL: "https://mastermaid-ubon-default-rtdb.asia-southeast1.firebasedatabase.app", 
        projectId: "mastermaid-ubon" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const webhook = "https://hook.us2.make.com/8ic5xqhrsfy8dbfqk6nkdhzaglv4qp23";

    let selectedMaid, currentJob, timerSec = 0, timerInt;

    function initStaff() {
        selectedMaid = document.getElementById('maidSelect').value;
        if(!selectedMaid) return;
        
        // ตรวจสอบงานส่วนตัว
        db.ref('personal_jobs/'+selectedMaid).on('value', snap => {
            const job = snap.val();
            if(job && job.status === "waiting") {
                currentJob = job;
                document.getElementById('jobInfo').innerText = "ลูกค้า: " + job.customer;
                document.getElementById('personalJob').style.display = "block";
            } else {
                document.getElementById('personalJob').style.display = "none";
            }
        });
        loadPublicJobs();
    }

    function loadPublicJobs() {
        db.ref('available_jobs').on('value', snap => {
            const jobs = snap.val();
            const area = document.getElementById('publicJobs');
            area.innerHTML = "<h4>📋 งานกองกลาง:</h4>";
            for(let id in jobs) {
                area.innerHTML += `<div class="job-box" style="border: 1px solid #555;">
                    <b>👤 ${jobs[id].title}</b><br>
                    🏠 ${jobs[id].property_type} (${jobs[id].room_details})<br>
                    ⏰ ${jobs[id].booking_time} - ${jobs[id].end_time_plan}<br>
                    💰 ราคา: ${jobs[id].price} บาท
                    <button class="btn" style="background:var(--gold); margin-top:10px;" onclick="acceptPublic('${id}')">กดรับงานนี้</button>
                </div>`;
            }
        });
    }

    function acceptJob() {
        if(confirm("ยืนยันรับงานส่วนตัวนี้?")) {
            window.currentJobData = { title: currentJob.customer, price: "ตามตกลง", rooms: "-" };
            db.ref('personal_jobs/'+selectedMaid).remove();
            startWorkLayout();
        }
    }

    function acceptPublic(id) {
        if(confirm("ยืนยันรับงานกองกลางนี้?")) {
            db.ref('available_jobs/'+id).once('value', snap => {
                window.currentJobData = snap.val();
                db.ref('available_jobs/'+id).remove();
                startWorkLayout();
            });
        }
    }

    function startWorkLayout() {
        document.getElementById('workingArea').style.display = "block";
        document.getElementById('statusBtn').disabled = true;
        db.ref('maid_status/'+selectedMaid).set("traveling");
    }

    function arrive() {
        db.ref('maid_status/'+selectedMaid).set("working");
        document.getElementById('arriveBtn').style.display = "none";
        document.getElementById('finishBtn').style.display = "block";
        
        timerInt = setInterval(() => {
            timerSec++;
            let h = Math.floor(timerSec / 3600).toString().padStart(2, '0');
            let m = Math.floor((timerSec % 3600) / 60).toString().padStart(2, '0');
            let s = (timerSec % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${h}:${m}:${s}`;
        }, 1000);
    }

    function finish() {
        // ตรวจเช็คลิสต์ก่อนจบงาน
        const isReady = document.getElementById('check1').checked && 
                        document.getElementById('check2').checked && 
                        document.getElementById('check3').checked && 
                        document.getElementById('check4').checked;
        
        if(!isReady) return alert("❌ กรุณาติ๊กเช็คลิสต์งานให้ครบทุกข้อก่อนส่งงานครับ");
        
        if(!confirm("จบงานและส่งรายงานพร้อมรูปภาพใช่หรือไม่?")) return;

        const dur = document.getElementById('timer').innerText;
        const endTime = new Date().toLocaleTimeString('th-TH');

        // ข้อมูลรายงาน
        const reportData = {
            maid_name: selectedMaid,
            customer: window.currentJobData.title,
            property_info: window.currentJobData.property_type + " (" + window.currentJobData.room_details + ")",
            price: window.currentJobData.price,
            duration: dur,
            end_time: endTime,
            status: "Success"
        };

        db.ref('maid_status/'+selectedMaid).set("available");

        // ส่งเข้า Make.com
        fetch(webhook, {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify(reportData)
        }).then(() => {
            alert("🏁 จบงานสำเร็จ! ข้อมูลและเช็คลิสต์ถูกส่งไปที่ LINE แล้ว");
            location.reload();
        });
    }

    function toggleStatus() {
        const btn = document.getElementById('statusBtn');
        if(btn.innerText.includes("ว่าง")) {
            btn.innerText = "🔴 ไม่สะดวก (พักงาน)";
            btn.style.background = "#dc3545";
            db.ref('maid_status/'+selectedMaid).set("busy");
        } else {
            btn.innerText = "🟢 ว่าง (พร้อมรับงาน)";
            btn.style.background = "#28a745";
            db.ref('maid_status/'+selectedMaid).set("available");
        }
    }
</script>

</body>
</html>
