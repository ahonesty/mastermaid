<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Panel | Master Maid</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --dark: #0A1931; --navy: #1A2F4F; --green: #28a745; --red: #dc3545; }
        body { font-family: 'Sarabun', sans-serif; background: var(--dark); color: white; text-align: center; padding: 15px; margin: 0; }
        .card { background: rgba(255,255,255,0.1); padding: 25px; border-radius: 25px; border: 1px solid var(--gold); max-width: 420px; margin: auto; backdrop-filter: blur(10px); position: relative; }
        
        /* สไตล์ปุ่ม Logout */
        .logout-btn { position: absolute; top: 15px; right: 15px; background: rgba(220, 53, 69, 0.2); color: #ff6b6b; border: 1px solid var(--red); padding: 5px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; transition: 0.3s; }
        
        /* Animation งานด่วนกะพริบ */
        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(212, 175, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }
        .personal-job-card { border: 3px solid var(--gold); background: rgba(212, 175, 55, 0.2) !important; animation: pulse-gold 2s infinite; margin-bottom: 20px; }

        /* สไตล์ทั่วไป */
        .login-input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid var(--gold); background: var(--navy); color: white; font-size: 20px; text-align: center; box-sizing: border-box; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; font-weight: bold; margin: 10px 0; border: none; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .job-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; border: 1px solid var(--gold); margin-top: 15px; text-align: left; }
        .checklist-area { background: var(--navy); padding: 15px; border-radius: 12px; margin-top: 15px; text-align: left; }
        .check-item { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .check-item input { width: 22px; height: 22px; accent-color: var(--gold); }
        
        #timer { font-size: 40px; font-weight: bold; color: var(--gold); margin: 20px 0; }
        .status-bar { padding: 12px; border-radius: 12px; margin-bottom: 15px; font-weight: bold; transition: 0.3s; }
    </style>
</head>
<body>

<div id="loginScreen" class="card" style="margin-top: 20vh;">
    <h2 style="color: var(--gold);">MASTER MAID</h2>
    <p>ใส่รหัสผ่านเพื่อเข้าใช้งาน</p>
    <input type="password" id="passCode" class="login-input" placeholder="รหัส 4 หลัก" maxlength="4">
    <button class="btn" style="background: var(--gold); color: var(--dark);" onclick="handleLogin()">เข้าสู่ระบบ</button>
</div>

<div id="mainDashboard" style="display:none;">
    <div class="card">
        <button class="logout-btn" onclick="handleLogout()">Logout 🚪</button>
        <h3 id="welcomeMsg" style="color: var(--gold); margin-top: 25px;"></h3>
        
        <div id="statusIndicator" class="status-bar" style="background: #333; color: #888;">🔴 ปิดระบบ (Offline)</div>
        <button id="toggleBtn" class="btn" style="background: #555; color: white;" onclick="toggleStatus()">คลิกเพื่อเปิดระบบ (Online)</button>
        
        <hr style="border: 0.1px solid #444; margin: 20px 0;">

        <div id="personalArea"></div> <div id="publicArea"></div>   </div>
</div>

<div id="workMode" style="display:none;" class="card">
    <div id="timer">00:00:00</div>
    <h4 id="workCust" style="color: var(--gold);"></h4>
    
    <div class="checklist-area">
        <label class="check-item"><input type="checkbox" class="task"> กวาดและถูพื้นทุกห้อง</label>
        <label class="check-item"><input type="checkbox" class="task"> เช็ดกระจกและระเบียง</label>
        <label class="check-item"><input type="checkbox" class="task"> ล้างห้องน้ำและสุขภัณฑ์</label>
        <label class="check-item"><input type="checkbox" class="task"> เก็บขยะทิ้งทั้งหมด</label>
    </div>

    <button id="arriveBtn" class="btn" style="background: var(--gold); color: var(--dark);" onclick="startWorkTimer()">📍 ถึงที่หมาย / เริ่มงาน</button>
    <button id="finishBtn" class="btn" style="background: var(--red); color: white; display: none;" onclick="finishJob()">🏁 จบงานและส่งรายงาน</button>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCTWK2HDu1QPn54YJMaTmJ5Xk8MLis3PAU", 
        databaseURL: "https://mastermaid-ubon-default-rtdb.asia-southeast1.firebasedatabase.app", 
        projectId: "mastermaid-ubon" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const webhook = "https://hook.us2.make.com/8ic5xqhrsfy8dbfqk6nkdhzaglv4qp23";
const staffDB = {
    "1111": "พี่เอ (MM01)",
    "2222": "พี่บี (MM02)",
    "3333": "พี่ซี (MM03)",
    "4444": "พี่ดี (MM04)",
    "5555": "พี่อี (MM05)",
    "6666": "พี่เอฟ (MM06)",
    "7777": "พี่กิ๊ก (MM07)",
    "8888": "พี่แก้ว (MM08)",
    "9999": "พี่เกด (MM09)",
    "1010": "พี่ก้อย (MM10)"
};

    let selectedMaid = "";
    let isOnline = false;
    let activeJob = null;
    let timerInt, seconds = 0;

    // --- ตรวจสอบสถานะและ Session เมื่อโหลดหน้า ---
    window.onload = function() {
        const savedMaid = localStorage.getItem("mastermaid_staff");
        const savedStatus = localStorage.getItem("mastermaid_online");
        if (savedMaid) {
            selectedMaid = savedMaid;
            if (savedStatus === "true") isOnline = true;
            showDashboard();
        }
    };

    function handleLogin() {
        const code = document.getElementById('passCode').value;
        if (staffDB[code]) {
            selectedMaid = staffDB[code];
            localStorage.setItem("mastermaid_staff", selectedMaid);
            showDashboard();
        } else { alert("❌ รหัสผิด!"); }
    }

    function showDashboard() {
        document.getElementById('loginScreen').style.display = "none";
        document.getElementById('mainDashboard').style.display = "block";
        document.getElementById('welcomeMsg').innerText = "สวัสดี, " + selectedMaid;
        updateStatusUI(isOnline);
        loadPublicJobs();
        listenForPersonalJob();
    }

    function handleLogout() {
        if (confirm("Logout?")) {
            db.ref('maid_status/' + selectedMaid).set("offline");
            localStorage.clear();
            location.reload();
        }
    }

    function toggleStatus() {
        isOnline = !isOnline;
        localStorage.setItem("mastermaid_online", isOnline);
        updateStatusUI(isOnline);
        db.ref('maid_status/' + selectedMaid).set(isOnline ? "available" : "offline");
    }

    function updateStatusUI(online) {
        const btn = document.getElementById('toggleBtn');
        const indicator = document.getElementById('statusIndicator');
        btn.innerText = online ? "🟢 ออนไลน์ (พร้อมรับงาน)" : "คลิกเพื่อเปิดระบบ (Online)";
        btn.style.background = online ? "var(--green)" : "#555";
        indicator.innerText = online ? "🟢 พร้อมรับงาน (Online)" : "🔴 ปิดระบบ (Offline)";
        indicator.style.background = online ? "rgba(40,167,69,0.2)" : "#333";
        indicator.style.color = online ? "var(--green)" : "#888";
    }

    function listenForPersonalJob() {
        db.ref('personal_jobs/' + selectedMaid).on('value', snap => {
            const job = snap.val();
            const area = document.getElementById('personalArea');
            if (job && job.status === "waiting") {
                area.innerHTML = `<div class="job-box personal-job-card">
                    <h4 style="margin:0; color:var(--gold);">📢 งานด่วนเฉพาะคุณ!</h4>
                    <p>ลูกค้า: <b>${job.customer}</b></p>
                    <button class="btn" style="background:var(--gold); color:var(--dark);" onclick="acceptJob('${selectedMaid}', 'personal')">✅ รับงานด่วน</button>
                </div>`;
            } else { area.innerHTML = ""; }
        });
    }

    function loadPublicJobs() {
        db.ref('available_jobs').on('value', snap => {
            const jobs = snap.val();
            const area = document.getElementById('publicArea');
            area.innerHTML = "<h4>📋 งานกองกลาง:</h4>";
            for (let id in jobs) {
                if (jobs[id].status === "available") {
                    area.innerHTML += `<div class="job-box" style="opacity: ${isOnline ? 1 : 0.4}; pointer-events: ${isOnline ? 'auto' : 'none'};">
                        <b>👤 ${jobs[id].title}</b><br>
                        <small>⏰ ${jobs[id].booking_time} | 💰 ${jobs[id].price}.-</small>
                        <button class="btn" style="background:var(--gold); margin-top:10px; padding:10px; font-size:14px;" onclick="acceptJob('${id}', 'public')">รับงานกองกลาง</button>
                    </div>`;
                }
            }
        });
    }

    function acceptJob(id, type) {
        if (!isOnline && type === 'public') return alert("กรุณา Online ก่อนรับงาน!");
        const path = type === 'personal' ? 'personal_jobs/' + id : 'available_jobs/' + id;
        db.ref(path).once('value', snap => {
            const data = snap.val();
            activeJob = type === 'personal' ? { title: data.customer, price: "ตามตกลง" } : data;
            db.ref(path).remove();
            startWorkLayout();
        });
    }

    function startWorkLayout() {
        document.getElementById('mainDashboard').style.display = "none";
        document.getElementById('workMode').style.display = "block";
        document.getElementById('workCust').innerText = "ลูกค้า: " + activeJob.title;
        db.ref('maid_status/' + selectedMaid).set("working");
    }

    function startWorkTimer() {
        document.getElementById('arriveBtn').style.display = "none";
        document.getElementById('finishBtn').style.display = "block";
        timerInt = setInterval(() => {
            seconds++;
            let h = Math.floor(seconds / 3600).toString().padStart(2, '0');
            let m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
            let s = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${h}:${m}:${s}`;
        }, 1000);
    }

    function finishJob() {
        const done = Array.from(document.querySelectorAll('.task')).every(t => t.checked);
        if(!done) return alert("❌ ติ๊กเช็คลิสต์ให้ครบทุกช่อง!");
        const report = { maid_name: selectedMaid, customer: activeJob.title, price: activeJob.price, duration: document.getElementById('timer').innerText, finished_at: new Date().toLocaleTimeString('th-TH') };
        fetch(webhook, { method: 'POST', body: JSON.stringify(report) }).then(() => {
            alert("🏁 จบงานสำเร็จ!");
            db.ref('maid_status/' + selectedMaid).set("available");
            location.reload();
        });
    }
</script>
</body>
</html>
