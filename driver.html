<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Maid | Driver Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; text-align: center; padding: 20px; background: #0A1931; color: white; margin: 0; }
        .card { background: rgba(255,255,255,0.1); padding: 25px; border-radius: 20px; border: 1px solid #D4AF37; max-width: 380px; margin: 20px auto; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .btn { width: 100%; padding: 20px; border-radius: 15px; border: none; font-size: 20px; font-weight: bold; cursor: pointer; margin: 10px 0; transition: 0.3s; display: block; }
        #startBtn { background: #D4AF37; color: #0A1931; }
        #arriveBtn { background: #28a745; color: white; display: none; }
        #finishBtn { background: #dc3545; color: white; display: none; }
        .timer-display { font-size: 42px; font-weight: bold; color: #D4AF37; margin: 15px 0; display: none; }
        .info-row { font-size: 14px; color: #D4AF37; margin: 5px 0; display: none; text-align: left; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; }
        #loading { display: none; color: #D4AF37; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="color: #D4AF37;">MASTER MAID</h2>
        <p>ระบบบันทึกเวลาปฏิบัติงาน (อุบลฯ)</p>
        <hr style="border: 0.1px solid rgba(212,175,55,0.2); margin: 15px 0;">

        <div id="jobDetails" class="info-row">
            <div id="dText">📅 วันที่: --</div>
            <div id="sText">⏰ เริ่มงาน: --</div>
        </div>

        <div id="timer" class="timer-display">00:00:00</div>
        
        <button id="startBtn" class="btn" onclick="startTracking()">🚀 เริ่มเดินทาง</button>
        <button id="arriveBtn" class="btn" onclick="arriveAtDestination()">📍 ถึงที่หมาย / เริ่มงาน</button>
        <button id="finishBtn" class="btn" onclick="finishJob()">🏁 จบงานและส่งรายงาน</button>
        <div id="loading">⏳ กำลังส่งข้อมูลเข้า LINE CEO...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCTWK2HDu1QPn54YJMaTmJ5Xk8MLis3PAU",
            databaseURL: "https://mastermaid-ubon-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "mastermaid-ubon",
            appId: "1:272279135131:web:18a1d12073e601688c773e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const webhookURL = "https://hook.us2.make.com/8ic5xqhrsfy8dbfqk6nkdhzaglv4qp23"; 

        let watchId = null, timerInterval = null, seconds = 0;
        let jobDate = "", jobStartTime = "";

        function startTracking() {
            document.getElementById('startBtn').style.display = "none";
            document.getElementById('arriveBtn').style.display = "block";
            watchId = navigator.geolocation.watchPosition((pos) => {
                db.ref('tracking/maid_01').set({ 
                    lat: pos.coords.latitude, 
                    lng: pos.coords.longitude, 
                    status: "กำลังเดินทาง" 
                });
            }, null, { enableHighAccuracy: true });
        }

        function arriveAtDestination() {
            if (!confirm("เริ่มนับเวลาทำงานใช่หรือไม่?")) return;
            if (watchId) navigator.geolocation.clearWatch(watchId);
            db.ref('tracking/maid_01').remove();
            
            const now = new Date();
            jobDate = now.toLocaleDateString('th-TH');
            jobStartTime = now.toLocaleTimeString('th-TH');

            document.getElementById('dText').innerText = "📅 วันที่: " + jobDate;
            document.getElementById('sText').innerText = "⏰ เริ่มงาน: " + jobStartTime;
            document.getElementById('jobDetails').style.display = "block";
            document.getElementById('arriveBtn').style.display = "none";
            document.getElementById('finishBtn').style.display = "block";
            document.getElementById('timer').style.display = "block";

            timerInterval = setInterval(() => {
                seconds++;
                let h = Math.floor(seconds/3600).toString().padStart(2,'0');
                let m = Math.floor((seconds%3600)/60).toString().padStart(2,'0');
                let s = (seconds%60).toString().padStart(2,'0');
                document.getElementById('timer').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        async function finishJob() {
            if (!confirm("จบงานและส่งรายงานเข้า LINE?")) return;
            
            clearInterval(timerInterval);
            document.getElementById('finishBtn').disabled = true;
            document.getElementById('loading').style.display = "block";

            const duration = document.getElementById('timer').innerText;
            const finishTime = new Date().toLocaleTimeString('th-TH');

            const sendReport = async (locUrl) => {
                try {
                    await fetch(webhookURL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            maid_name: "แม่บ้าน 01",
                            work_date: jobDate,
                            start_at: jobStartTime,
                            finished_at: finishTime,
                            duration: duration,
                            location_url: locUrl || "ไม่ระบุพิกัด"
                        })
                    });
                    alert("✅ แจ้งเตือนส่งสำเร็จ!");
                    location.reload();
                } catch (e) {
                    alert("❌ ล้มเหลว: " + e.message);
                    document.getElementById('finishBtn').disabled = false;
                    document.getElementById('loading').style.display = "none";
                }
            };

            if (navigator.geolocation) {
                const timeout = setTimeout(() => sendReport(), 4000);
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        clearTimeout(timeout);
                        sendReport(`https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`);
                    },
                    () => { clearTimeout(timeout); sendReport(); },
                    { enableHighAccuracy: true, timeout: 3500 }
                );
            } else {
                sendReport();
            }
        }
    </script>
</body>
</html>
