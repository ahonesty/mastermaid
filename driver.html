<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Maid | Driver Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; text-align: center; padding: 40px 20px; background: #0A1931; color: white; }
        .card { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 25px; border: 1px solid #D4AF37; max-width: 400px; margin: 0 auto; }
        .btn { width: 100%; padding: 20px; border-radius: 15px; border: none; font-size: 20px; font-weight: bold; cursor: pointer; margin: 10px 0; transition: 0.3s; }
        .btn-start { background: #D4AF37; color: #0A1931; }
        .btn-stop { background: #dc3545; color: white; display: none; }
        .status-badge { display: inline-block; padding: 8px 15px; border-radius: 50px; background: #06C755; color: white; font-size: 14px; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h2>แผงควบคุมแม่บ้าน</h2>
        <p>Master Maid Thailand</p>
        <hr style="border: 0.5px solid rgba(212,175,55,0.2);">
        
        <button id="startBtn" class="btn btn-start" onclick="startTracking()">🚀 เริ่มเดินทาง</button>
        <button id="stopBtn" class="btn btn-stop" onclick="finishJob()">🏁 ถึงที่หมายแล้ว</button>
        
        <div id="status" class="status-badge">🟢 กำลังแชร์ตำแหน่ง...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCTWK2HDu1QPn54YJMaTmJ5Xk8MLis3PAU",
            databaseURL: "https://mastermaid-ubon-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "mastermaid-ubon",
            appId: "1:272279135131:web:18a1d12073e601688c773e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let watchId = null;

        function startTracking() {
            if (navigator.geolocation) {
                document.getElementById('startBtn').style.display = "none";
                document.getElementById('stopBtn').style.display = "block";
                document.getElementById('status').style.display = "inline-block";

                watchId = navigator.geolocation.watchPosition((pos) => {
                    db.ref('tracking/maid_01').set({
                        lat: pos.coords.latitude,
                        lng: pos.coords.longitude,
                        status: "On the way",
                        time: new Date().toLocaleTimeString()
                    });
                }, (err) => alert("กรุณาเปิด GPS"), { enableHighAccuracy: true });
            }
        }

        function finishJob() {
            if (confirm("ยืนยันว่าถึงที่หมายแล้วใช่ไหม? ระบบจะหยุดแชร์ตำแหน่งทันที")) {
                if (watchId) navigator.geolocation.clearWatch(watchId);
                db.ref('tracking/maid_01').remove(); // ลบพิกัดเพื่อให้หมุดและเส้นในหน้าลูกค้าหายไป
                
                document.getElementById('startBtn').style.display = "block";
                document.getElementById('stopBtn').style.display = "none";
                document.getElementById('status').style.display = "none";
                alert("สิ้นสุดการเดินทาง เริ่มงานทำความสะอาดได้เลย!");
            }
        }
    </script>
</body>
</html>
