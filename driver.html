<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Maid | Staff Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; text-align: center; padding: 20px; background: #0A1931; color: white; margin: 0; }
        .card { background: rgba(255,255,255,0.1); padding: 25px; border-radius: 20px; border: 1px solid #D4AF37; max-width: 380px; margin: 20px auto; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .btn { width: 100%; padding: 18px; border-radius: 12px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; margin: 8px 0; transition: 0.2s; display: block; }
        #startBtn { background: #D4AF37; color: #0A1931; }
        #arriveBtn { background: #28a745; color: white; display: none; }
        #finishBtn { background: #dc3545; color: white; display: none; }
        .timer-display { font-size: 42px; font-weight: bold; color: #D4AF37; margin: 15px 0; display: none; }
        select { background: #1A2F4F; color: white; border: 1px solid #D4AF37; padding: 15px; width: 100%; border-radius: 12px; font-size: 16px; margin-bottom: 10px; }
        select:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Modal Style */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #0A1931; padding: 25px; border-radius: 20px; border: 2px solid #D4AF37; width: 85%; max-width: 300px; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="color: #D4AF37;">MASTER MAID</h2>
        
        <div id="setupSection">
            <p style="margin-bottom: 10px;">👤 โปรดเลือกชื่อของคุณ:</p>
            <select id="maidSelect">
                <option value="พี่เอ (MM01)">แม่บ้าน 01 - พี่เอ</option>
                <option value="พี่บี (MM02)">แม่บ้าน 02 - พี่บี</option>
                <option value="พี่ซี (MM03)">แม่บ้าน 03 - พี่ซี</option>
            </select>
        </div>

        <div id="timer" class="timer-display">00:00:00</div>
        
        <button id="startBtn" class="btn" onclick="startTracking()">🚀 เริ่มเดินทาง</button>
        <button id="arriveBtn" class="btn" onclick="arriveAtDestination()">📍 ถึงที่หมาย / เริ่มงาน</button>
        <button id="finishBtn" class="btn" onclick="showConfirm()">🏁 จบงานและส่งรายงาน</button>
    </div>

    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <h3 style="color: #D4AF37; margin-top: 0;">ยืนยันการจบงาน?</h3>
            <button class="btn" style="background: #28a745; color: white;" onclick="finishJob()">✅ ยืนยัน</button>
            <button class="btn" style="background: #6c757d; color: white;" onclick="hideConfirm()">❌ ยกเลิก</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCTWK2HDu1QPn54YJMaTmJ5Xk8MLis3PAU",
            databaseURL: "https://mastermaid-ubon-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "mastermaid-ubon",
            appId: "1:272279135131:web:18a1d12073e601688c773e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const webhookURL = "https://hook.us2.make.com/8ic5xqhrsfy8dbfqk6nkdhzaglv4qp23"; 

        let watchId = null, timerInterval = null, seconds = 0;
        let jobDate = "", jobStartTime = "", selectedMaid = "";

        // --- ระบบเช็คชื่อซ้ำอัตโนมัติ ---
        function checkBusyMaids() {
            db.ref('tracking').on('value', (snapshot) => {
                const busyData = snapshot.val();
                const selectElement = document.getElementById('maidSelect');
                for (let i = 0; i < selectElement.options.length; i++) {
                    const option = selectElement.options[i];
                    if (busyData && busyData[option.value]) {
                        option.disabled = true;
                        if (!option.text.includes("⏳")) option.text += " (⏳ กำลังงาน)";
                    } else {
                        option.disabled = false;
                        option.text = option.text.replace(" (⏳ กำลังงาน)", "");
                    }
                }
            });
        }
        window.onload = checkBusyMaids;

        function startTracking() {
            selectedMaid = document.getElementById('maidSelect').value;
            
            // Double Check ก่อนเริ่มงาน
            db.ref('tracking/' + selectedMaid).get().then((snapshot) => {
                if (snapshot.exists()) {
                    alert("❌ มีคนเลือกชื่อนี้ไปแล้ว โปรดเลือกชื่ออื่น!");
                    location.reload();
                    return;
                }

                document.getElementById('setupSection').style.display = "none";
                document.getElementById('startBtn').style.display = "none";
                document.getElementById('arriveBtn').style.display = "block";
                
                watchId = navigator.geolocation.watchPosition((pos) => {
                    db.ref('tracking/' + selectedMaid).set({ 
                        lat: pos.coords.latitude, 
                        lng: pos.coords.longitude, 
                        status: "กำลังเดินทาง" 
                    });
                }, null, { enableHighAccuracy: true });
            });
        }

        function arriveAtDestination() {
            if (!confirm("เริ่มนับเวลาทำงานใช่หรือไม่?")) return;
            if (watchId) navigator.geolocation.clearWatch(watchId);
            
            // ลบตำแหน่งเดินทาง เพื่อเปิดให้ชื่อกลับมาว่าง (หรือจะลบตอนจบงานก็ได้ตามต้องการ)
            db.ref('tracking/' + selectedMaid).remove();
            
            const now = new Date();
            jobDate = now.toLocaleDateString('th-TH');
            jobStartTime = now.toLocaleTimeString('th-TH');

            document.getElementById('arriveBtn').style.display = "none";
            document.getElementById('finishBtn').style.display = "block";
            document.getElementById('timer').style.display = "block";

            timerInterval = setInterval(() => {
                seconds++;
                let h = Math.floor(seconds/3600).toString().padStart(2,'0');
                let m = Math.floor((seconds%3600)/60).toString().padStart(2,'0');
                let s = (seconds%60).toString().padStart(2,'0');
                document.getElementById('timer').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        function showConfirm() { document.getElementById('confirmModal').style.display = "flex"; }
        function hideConfirm() { document.getElementById('confirmModal').style.display = "none"; }

        async function finishJob() {
            hideConfirm();
            const duration = document.getElementById('timer').innerText;
            clearInterval(timerInterval);
            document.getElementById('finishBtn').disabled = true;
            document.getElementById('finishBtn').innerText = "⏳ กำลังส่งรายงาน...";

            const sendReport = (locUrl) => {
                fetch(webhookURL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        maid_name: selectedMaid,
                        work_date: jobDate,
                        start_at: jobStartTime,
                        finished_at: new Date().toLocaleTimeString('th-TH'),
                        duration: duration,
                        location_url: locUrl || "ไม่ระบุพิกัด"
                    })
                }).then(() => {
                    alert("✅ ส่งรายงานสำเร็จ!");
                    location.reload();
                });
            };

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (p) => sendReport(`https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`),
                    () => sendReport(), { timeout: 5000 }
                );
            } else { sendReport(); }
        }
    </script>
</body>
</html>
