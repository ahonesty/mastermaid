<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Panel | Master Maid</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --dark: #0A1931; --navy: #1A2F4F; --green: #28a745; --red: #dc3545; }
        body { font-family: 'Sarabun', sans-serif; background: var(--dark); color: white; text-align: center; padding: 15px; margin: 0; }
        .card { background: rgba(255,255,255,0.1); padding: 25px; border-radius: 25px; border: 1px solid var(--gold); max-width: 420px; margin: auto; backdrop-filter: blur(10px); position: relative; }
        
        /* สไตล์ Logout */
        .logout-btn { position: absolute; top: 15px; right: 15px; background: rgba(220, 53, 69, 0.2); color: #ff6b6b; border: 1px solid var(--red); padding: 5px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; transition: 0.3s; }
        .logout-btn:hover { background: var(--red); color: white; }

        /* สไตล์ Login */
        #loginScreen { display: flex; flex-direction: column; justify-content: center; min-height: 80vh; }
        .login-input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid var(--gold); background: var(--navy); color: white; font-size: 18px; box-sizing: border-box; text-align: center; }
        
        /* สไตล์ทั่วไป */
        .btn { width: 100%; padding: 16px; border-radius: 12px; font-weight: bold; margin: 10px 0; border: none; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .job-box { background: rgba(212,175,55,0.05); padding: 15px; border-radius: 15px; border: 1.5px solid var(--gold); margin-top: 15px; text-align: left; }
        .checklist-area { background: var(--navy); padding: 15px; border-radius: 12px; margin-top: 15px; text-align: left; }
        .check-item { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .check-item input { width: 22px; height: 22px; accent-color: var(--gold); }
        
        .photo-upload { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 10px; margin-top: 10px; border: 1px dashed var(--gold); text-align: left; }
        .photo-label { font-size: 13px; color: var(--gold); display: block; margin-bottom: 5px; }

        #timer { font-size: 36px; font-weight: bold; color: var(--gold); margin: 20px 0; text-shadow: 0 0 10px rgba(212,175,55,0.5); }
        .status-bar { padding: 12px; border-radius: 12px; margin-bottom: 15px; font-size: 15px; font-weight: bold; transition: 0.3s; }
    </style>
</head>
<body>

<div id="loginScreen" class="card">
    <h2 style="color: var(--gold); margin-bottom: 10px;">MASTER MAID</h2>
    <p style="color: #ccc;">กรุณาใส่รหัสผ่านเพื่อเข้าใช้งาน</p>
    <input type="password" id="passCode" class="login-input" placeholder="รหัสผ่าน 4 หลัก" maxlength="4">
    <button class="btn" style="background: var(--gold); color: var(--dark);" onclick="handleLogin()">เข้าสู่ระบบ</button>
</div>

<div id="mainDashboard" style="display:none;">
    <div class="card">
        <button class="logout-btn" onclick="handleLogout()">Logout 🚪</button>
        <h3 id="welcomeMsg" style="color: var(--gold); margin-top: 25px; margin-bottom: 15px;"></h3>
        
        <div id="statusIndicator" class="status-bar" style="background: #333; color: #888;">🔴 ปิดระบบ (Offline)</div>
        <button id="toggleBtn" class="btn" style="background: #555; color: white;" onclick="toggleStatus()">คลิกเพื่อเปิดระบบ (Online)</button>
        
        <hr style="border: 0.1px solid #444; margin: 20px 0;">

        <div id="jobListArea">
            <div id="personalArea"></div>
            <div id="publicArea"></div>
        </div>
    </div>
</div>

<div id="workMode" style="display:none;" class="card">
    <div id="timer">00:00:00</div>
    <h4 id="workWith" style="color: var(--gold); margin: 0 0 15px 0;"></h4>
    
    <div class="checklist-area">
        <h5 style="margin: 0 0 10px 0; color: var(--gold);">📋 รายการตรวจสอบงาน:</h5>
        <label class="check-item"><input type="checkbox" class="task"> กวาดและถูพื้นทุกห้อง</label>
        <label class="check-item"><input type="checkbox" class="task"> เช็ดกระจกและระเบียง</label>
        <label class="check-item"><input type="checkbox" class="task"> ล้างห้องน้ำและสุขภัณฑ์</label>
        <label class="check-item"><input type="checkbox" class="task"> เก็บขยะทิ้งทั้งหมด</label>
    </div>

    <div class="photo-upload">
        <span class="photo-label">📸 รูปถ่ายก่อน-หลังงาน (ถ้ามี):</span>
        <input type="file" accept="image/*" capture="camera" style="font-size: 11px;">
    </div>

    <button id="arriveBtn" class="btn" style="background: var(--gold); color: var(--dark);" onclick="startWorkTimer()">📍 ถึงที่หมาย / เริ่มจับเวลา</button>
    <button id="finishBtn" class="btn" style="background: var(--red); color: white; display: none;" onclick="finishJob()">🏁 จบงานและส่งรายงาน</button>
</div>

<script>
    // --- 1. ตั้งค่า Firebase & Webhook ---
    const firebaseConfig = { 
        apiKey: "AIzaSyCTWK2HDu1QPn54YJMaTmJ5Xk8MLis3PAU", 
        databaseURL: "https://mastermaid-ubon-default-rtdb.asia-southeast1.firebasedatabase.app", 
        projectId: "mastermaid-ubon" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const webhook = "https://hook.us2.make.com/8ic5xqhrsfy8dbfqk6nkdhzaglv4qp23";

    const staffDB = {
        "1111": "พี่เอ (MM01)", "2222": "พี่บี (MM02)", "3333": "พี่ซี (MM03)",
        "4444": "พี่ดี (MM04)", "5555": "พี่อี (MM05)", "6666": "พี่เอฟ (MM06)"
    };

    let selectedMaid = "";
    let isOnline = false;
    let activeJob = null;
    let timerInt;
    let seconds = 0;

    // --- 2. ระบบจำ Session เมื่อ Refresh ---
    window.onload = function() {
        const savedUser = localStorage.getItem("mastermaid_staff");
        if (savedUser) {
            selectedMaid = savedUser;
            showDashboard();
        }
    };

    function handleLogin() {
        const code = document.getElementById('passCode').value;
        if (staffDB[code]) {
            selectedMaid = staffDB[code];
            localStorage.setItem("mastermaid_staff", selectedMaid);
            showDashboard();
        } else {
            alert("❌ รหัสผ่านไม่ถูกต้อง!");
        }
    }

    function showDashboard() {
        document.getElementById('loginScreen').style.display = "none";
        document.getElementById('mainDashboard').style.display = "block";
        document.getElementById('welcomeMsg').innerText = "สวัสดี, " + selectedMaid;
        loadJobs();
    }

    function handleLogout() {
        if (confirm("ต้องการออกจากระบบใช่หรือไม่?")) {
            if (isOnline) {
                db.ref('maid_status/' + selectedMaid).set("offline");
            }
            localStorage.removeItem("mastermaid_staff");
            location.reload(); 
        }
    }

    // --- 3. ระบบสถานะ (Online/Offline) ---
    function toggleStatus() {
        const btn = document.getElementById('toggleBtn');
        const indicator = document.getElementById('statusIndicator');
        
        if (!isOnline) {
            isOnline = true;
            btn.innerText = "🟢 กำลังออนไลน์ (พร้อมรับงาน)";
            btn.style.background = "var(--green)";
            indicator.innerText = "🟢 พร้อมรับงาน (Online)";
            indicator.style.background = "rgba(40,167,69,0.2)";
            indicator.style.color = "var(--green)";
            db.ref('maid_status/' + selectedMaid).set("available");
        } else {
            isOnline = false;
            btn.innerText = "คลิกเพื่อเปิดระบบ (Online)";
            btn.style.background = "#555";
            indicator.innerText = "🔴 ปิดระบบ (Offline)";
            indicator.style.background = "#333";
            indicator.style.color = "#888";
            db.ref('maid_status/' + selectedMaid).set("offline");
        }
    }

    // --- 4. ระบบงาน ---
    function loadJobs() {
        // งานกองกลาง
        db.ref('available_jobs').on('value', snap => {
            const jobs = snap.val();
            const area = document.getElementById('publicArea');
            area.innerHTML = "<h4>📋 งานกองกลาง:</h4>";
            if (!jobs) { area.innerHTML += "<p style='color:#666;'>ยังไม่มีงานใหม่ค้างอยู่</p>"; return; }
            
            for (let id in jobs) {
                if (jobs[id].status === "available") {
                    area.innerHTML += `
                    <div class="job-box" style="opacity: ${isOnline ? 1 : 0.4}; pointer-events: ${isOnline ? 'auto' : 'none'};">
                        <b style="color:var(--gold); font-size:18px;">👤 ${jobs[id].title}</b><br>
                        <small>🏠 ${jobs[id].property_type} (${jobs[id].room_details})</small><br>
                        <small>⏰ ${jobs[id].booking_time} | 💰 ${jobs[id].price}.-</small>
                        <button class="btn" style="background:var(--gold); margin-top:10px; font-size:14px; padding:10px;" onclick="acceptJob('${id}')">กดรับงานนี้</button>
                    </div>`;
                }
            }
        });
    }

    function acceptJob(id) {
        if (!isOnline) return alert("❌ โปรดเปิดระบบ Online ก่อนรับงานครับ!");
        if (!confirm("ยืนยันการรับงานนี้?")) return;

        db.ref('available_jobs/' + id).once('value', snap => {
            activeJob = snap.val();
            db.ref('available_jobs/' + id).remove();
            startWorkMode();
        });
    }

    function startWorkMode() {
        document.getElementById('mainDashboard').style.display = "none";
        document.getElementById('workMode').style.display = "block";
        document.getElementById('workWith').innerText = "กำลังทำงานให้: " + activeJob.title;
        db.ref('maid_status/' + selectedMaid).set("working");
    }

    function startWorkTimer() {
        document.getElementById('arriveBtn').style.display = "none";
        document.getElementById('finishBtn').style.display = "block";
        timerInt = setInterval(() => {
            seconds++;
            let h = Math.floor(seconds / 3600).toString().padStart(2, '0');
            let m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
            let s = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${h}:${m}:${s}`;
        }, 1000);
    }

    function finishJob() {
        const tasks = document.querySelectorAll('.task');
        let done = true;
        tasks.forEach(t => { if(!t.checked) done = false; });
        if(!done) return alert("❌ กรุณาเช็คลิสต์งานให้ครบทุกข้อก่อนจบงานครับ!");
        
        if(!confirm("ยืนยันจบงานและส่งรายงาน?")) return;

        const duration = document.getElementById('timer').innerText;
        const report = {
            maid_name: selectedMaid,
            customer: activeJob.title,
            price: activeJob.price,
            duration: duration,
            finished_at: new Date().toLocaleTimeString('th-TH')
        };

        fetch(webhook, { 
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(report) 
        }).then(() => {
            alert("🏁 ส่งรายงานสำเร็จ! ระบบจะรีเซ็ตสถานะเป็นพร้อมรับงานถัดไป");
            db.ref('maid_status/' + selectedMaid).set("available");
            location.reload();
        });
    }
    const messaging = firebase.messaging();

// ขออนุญาตสิทธิ์การแจ้งเตือน
function requestNotificationPermission() {
    Notification.requestPermission().then((permission) => {
        if (permission === 'granted') {
            console.log('Notification permission granted.');
            // ดึง Token ของเครื่องแม่บ้านเพื่อเก็บไว้ส่งงานให้ถูกคน
            messaging.getToken({ vapidKey: 'YOUR_PUBLIC_VAPID_KEY' }).then((currentToken) => {
                if (currentToken) {
                    db.ref('staff_tokens/' + selectedMaid).set(currentToken);
                }
            });
        }
    });
}
</script>

</body>
</html>
