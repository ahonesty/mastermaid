<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEO | Post Job</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #0A1931; color: white; padding: 20px; text-align: center; }
        .box { background: rgba(255,255,255,0.1); padding: 25px; border-radius: 20px; border: 1px solid #D4AF37; max-width: 400px; margin: auto; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #D4AF37; background: #1A2F4F; color: white; box-sizing: border-box; }
        button { width: 100%; background: #D4AF37; color: #0A1931; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .status-item { text-align: left; padding: 5px; border-bottom: 0.5px solid #333; }
        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>📢 จ่ายงาน Master Maid</h2>
        <select id="assignTo">
            <option value="">-- เลือกแม่บ้าน --</option>
            <option value="พี่เอ (MM01)">พี่เอ (MM01)</option>
            <option value="พี่บี (MM02)">พี่บี (MM02)</option>
            <option value="พี่ซี (MM03)">พี่ซี (MM03)</option>
        </select>
        <input type="text" id="cust" placeholder="ชื่อลูกค้า">
        <textarea id="det" rows="3" placeholder="รายละเอียดงาน"></textarea>
        <button onclick="send()">ส่งงาน (15 นาที)</button>
        <hr>
        <div id="statusArea"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCTWK2HDu1QPn54YJMaTmJ5Xk8MLis3PAU",
            databaseURL: "https://mastermaid-ubon-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "mastermaid-ubon"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function send() {
            const maid = document.getElementById('assignTo').value;
            const cust = document.getElementById('cust').value;
            if(!maid || !cust) return alert("กรอกข้อมูลให้ครบ");
            db.ref('personal_jobs/'+maid).set({
                customer: cust, detail: document.getElementById('det').value,
                status: "waiting", expiryAt: Date.now() + (15*60*1000)
            }).then(() => alert("ส่งงานสำเร็จ!"));
        }

        db.ref('maid_status').on('value', (snap) => {
            const data = snap.val();
            const area = document.getElementById('statusArea');
            area.innerHTML = "<h4>สถานะปัจจุบัน:</h4>";
            for(let name in data) {
                const s = data[name];
                const color = s === "available" ? "#28a745" : "#dc3545";
                area.innerHTML += `<div class="status-item"><span class="dot" style="background:${color}"></span>${name}: ${s}</div>`;
            }
        });
    </script>
</body>
</html>
