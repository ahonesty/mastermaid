<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Maid Thailand</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body class="bg-gray-50 text-gray-800">

    <header class="bg-blue-600 text-white py-16 text-center">
        <h1 id="logo-text" class="text-5xl font-bold mb-2">Master Maid</h1>
        <p id="slogan" class="text-xl opacity-90">สะอาด มั่นใจ วางใจเรา</p>
    </header>

    <section class="max-w-5xl mx-auto px-4 py-16">
        <div class="grid md:grid-cols-2 gap-8 text-center">
            <div class="bg-white p-8 rounded-3xl shadow-xl border-2 border-blue-400">
                <h3 class="text-2xl font-bold mb-4">ทำความสะอาดทั่วไป</h3>
                <p id="price-basic" class="text-5xl font-black text-blue-600">650.-</p>
            </div>
            <div class="bg-white p-8 rounded-3xl shadow-xl border-2 border-blue-400">
                <h3 class="text-2xl font-bold mb-4">Big Cleaning</h3>
                <p id="price-big" class="text-5xl font-black text-blue-600">2,000.-</p>
            </div>
        </div>
    </section>

    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
</body>
</html>
