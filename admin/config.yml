backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "pages"
    label: "จัดการเนื้อหาเว็บไซต์"
    files:
      - file: "index.html"
        label: "หน้าหลัก (Master Maid)"
        name: "home"
        fields:
          - label: "1. ส่วนบน (Header)"
            name: "header"
            widget: "object"
            fields:
              - {label: "ชื่อร้าน/โลโก้", name: "logo_text", widget: "string", default: "Master Maid"}
              - {label: "สโลแกนใต้ชื่อร้าน", name: "slogan", widget: "string", default: "สะอาด มั่นใจ วางใจเรา"}
          
          - label: "2. ราคาแพ็กเกจ (Packages)"
            name: "packages"
            widget: "object"
            fields:
              - {label: "ราคาเริ่มต้นทั่วไป", name: "price_basic", widget: "string", default: "650.-"}
              - {label: "ราคาเริ่มต้น Big Cleaning", name: "price_big", widget: "string", default: "2,000.-"}

          - label: "3. บทความและรายละเอียด (Content)"
            name: "content"
            widget: "object"
            fields:
              - {label: "หัวข้อบทความ", name: "title", widget: "string", default: "ทำไมต้องเลือกเรา"}
              - {label: "เนื้อหาบทความ", name: "body", widget: "markdown", default: "รายละเอียดบริการของเรา..."}
