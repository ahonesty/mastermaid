<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Maid | จองบริการ</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=places&language=th"></script>
    
    <style>
        /* กลับไปใช้ CSS เดิมที่คุณออกแบบไว้ */
        body { font-family: 'Sarabun', sans-serif; background-color: #f8f9fa; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 15px; background-color: #007bff; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
        .btn-submit:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <div class="container">
        <h2>จองบริการ Master Maid</h2>
        
        <div class="form-group">
            <label>ชื่อ-นามสกุล:</label>
            <input type="text" id="custName">
        </div>
        
        <div class="form-group">
            <label>เบอร์โทรศัพท์:</label>
            <input type="tel" id="custPhone">
        </div>

        <div class="form-group">
            <label>ประเภทที่พัก:</label>
            <select id="propertyType">
                <option value="บ้านเดี่ยว">บ้านเดี่ยว</option>
                <option value="ทาวน์โฮม">ทาวน์โฮม</option>
                <option value="คอนโด">คอนโด</option>
            </select>
        </div>

        <div class="form-group">
            <label>จำนวนห้อง (นอน/น้ำ):</label>
            <input type="text" id="roomDetails" placeholder="เช่น 2 นอน 1 น้ำ">
        </div>

        <div class="form-group">
            <label>วันที่รับบริการ:</label>
            <input type="date" id="serviceDate">
        </div>

        <div class="form-group">
            <label>เวลาที่ต้องการ:</label>
            <input type="time" id="startTime">
        </div>

        <div class="form-group">
            <label>สถานที่ (ค้นหาจากแผนที่):</label>
            <input type="text" id="custLoc" placeholder="พิมพ์สถานที่...">
        </div>

        <div class="form-group">
            <label>ราคาค่าบริการ (บาท):</label>
            <input type="number" id="price">
        </div>

        <button class="btn-submit" onclick="confirmBooking()">ยืนยันการจอง</button>
    </div>

    <script>
        // --- ส่วนเชื่อมต่อ Firebase (ใช้ค่าเดิมของคุณ) ---
        const firebaseConfig = { 
            apiKey: "AIzaSyCTWK2HDu1QPn54YJMaTmJ5Xk8MLis3PAU", 
            databaseURL: "https://mastermaid-ubon-default-rtdb.asia-southeast1.firebasedatabase.app", 
            projectId: "mastermaid-ubon" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let selectedLat = 0, selectedLng = 0;

        // ระบบค้นหาที่อยู่ Google Maps (แบบเดิม)
        function initAutocomplete() {
            const input = document.getElementById('custLoc');
            const autocomplete = new google.maps.places.Autocomplete(input);
            autocomplete.addListener("place_changed", () => {
                const place = autocomplete.getPlace();
                if (place.geometry) {
                    selectedLat = place.geometry.location.lat();
                    selectedLng = place.geometry.location.lng();
                }
            });
        }
        google.maps.event.addDomListener(window, 'load', initAutocomplete);

        // ฟังก์ชันยืนยันการจอง ส่งเข้า available_jobs
        function confirmBooking() {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const price = document.getElementById('price').value;
            const address = document.getElementById('custLoc').value;

            if (!name || !phone || !price || !address) {
                alert("กรุณากรอกข้อมูลให้ครบถ้วน");
                return;
            }

            db.ref('available_jobs').push({
                title: name,
                phone: phone,
                property_type: document.getElementById('propertyType').value,
                room_details: document.getElementById('roomDetails').value,
                booking_date: document.getElementById('serviceDate').value,
                booking_time: document.getElementById('startTime').value,
                price: price,
                detail: address,
                location_url: `https://www.google.com/maps?q=${selectedLat},${selectedLng}`,
                status: "available",
                postedAt: Date.now()
            }).then(() => {
                alert("จองสำเร็จ!");
                location.reload();
            });
        }
    </script>
</body>
</html>
