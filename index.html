<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Maid Thailand</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD7Qqf1Z9KQBuvipDzgIc5laJLz9SiOBH8&libraries=places"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #0A1931; --g: #D4AF37; }
        body { font-family: 'Sarabun'; margin: 0; background: #F4F7F6; text-align: center; }
        nav { background: #fff; padding: 15px; box-shadow: 0 2px 5px #0002; }
        .box { background: #fff; border-radius: 20px; padding: 30px; max-width: 800px; margin: 20px auto; box-shadow: 0 10px 30px #0001; }
        #map { height: 400px; border-radius: 15px; border: 2px solid var(--g); margin: 15px 0; }
        input, select, button { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { background: var(--g); color: var(--p); font-weight: 700; border: none; cursor: pointer; }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); color:#fff; padding-top:20%; z-index:99; }
    </style>
</head>
<body>
    <nav><b>MASTER MAID THAILAND</b></nav>
    <div class="box">
        <h3>จองและติดตามแม่บ้าน Real-time</h3>
        <input id="pac-input" type="text" placeholder="ค้นหาที่อยู่...">
        <div id="map"></div>
        <form id="maidForm" action="https://hook.us2.make.com/u4ddkucyj2gbd9gj14om5cdtu3qjnzxx" method="POST">
            <input type="text" name="name" placeholder="ชื่อลูกค้า" required>
            <input type="tel" name="phone" placeholder="เบอร์โทร" required>
            <select name="service" onchange="document.getElementById('total').innerText = this.value == 'Big' ? '2,000' : '550'">
                <option value="General">ทำความสะอาดทั่วไป (550.-)</option>
                <option value="Big">Deep / Big Cleaning (2,000.-)</option>
            </select>
            <input type="hidden" name="lat_long" id="lat_long">
            <p>ยอดรวม: <span id="total">550</span>.- บาท</p>
            <button type="submit">ยืนยันการจอง</button>
        </form>
    </div>

    <div class="overlay" id="overlay">
        <h2>ข้อมูลส่งถึงแอดมินแล้ว!</h2>
        <p>ชำระมัดจำ 200.- เพื่อยืนยันคิว</p>
        <button onclick="window.location.href='line://oaMessage/@301xqlpj/?แจ้งสลิป Master Maid'">แจ้งสลิปผ่าน LINE</button>
    </div>

    <script>
        const cfg = {
            apiKey: "AIzaSyCTWK2HDu1QPn54YJMaTmJ5Xk8MLis3PAU",
            databaseURL: "https://mastermaid-ubon-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "mastermaid-ubon",
            appId: "1:272279135131:web:18a1d12073e601688c773e"
        };
        firebase.initializeApp(cfg);
        const db = firebase.database();

        function initMap() {
            const ubon = { lat: 15.22, lng: 104.85 };
            const map = new google.maps.Map(document.getElementById("map"), { center: ubon, zoom: 14 });
            const marker = new google.maps.Marker({ map, draggable: true, position: ubon });
            const maid = new google.maps.Marker({ map, icon: { url: "https://cdn-icons-png.flaticon.com/512/1904/1904925.png", scaledSize: new google.maps.Size(40, 40) } });

            db.ref('tracking/maid_01').on('value', s => { if(s.val()) maid.setPosition(s.val()); });
            
            map.addListener("click", e => { marker.setPosition(e.latLng); document.getElementById("lat_long").value = e.latLng.lat()+","+e.latLng.lng(); });
            const ac = new google.maps.places.Autocomplete(document.getElementById("pac-input"));
            ac.addListener("place_changed", () => { const p = ac.getPlace(); map.setCenter(p.geometry.location); marker.setPosition(p.geometry.location); });
        }

        document.getElementById('maidForm').onsubmit = e => {
            e.preventDefault();
            document.getElementById('overlay').style.display = 'block';
            fetch(e.target.action, { method: 'POST', body: new FormData(e.target), mode: 'no-cors' });
        };
        google.maps.event.addDomListener(window, 'load', initMap);
    </script>
</body>
</html>
