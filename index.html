<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Maid | ระบบจองพรีเมียม</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=places&language=th"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --dark: #0A1931; --navy: #1A2F4F; }
        
        /* จัดวางทุกอย่างให้อยู่กึ่งกลางหน้าจอ */
        body { 
            font-family: 'Sarabun', sans-serif; 
            background: var(--dark); 
            color: white; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; /* ให้ความสูงเต็มจอเพื่อจัดกึ่งกลาง */
            padding: 20px;
            box-sizing: border-box;
        }

        .container { width: 100%; max-width: 450px; }
        
        .card { 
            background: rgba(255,255,255,0.1); 
            padding: 30px; 
            border-radius: 25px; 
            border: 1px solid var(--gold); 
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); 
            backdrop-filter: blur(10px);
            text-align: center;
        }

        .logo { font-size: 28px; font-weight: bold; color: var(--gold); margin-bottom: 20px; letter-spacing: 2px; }
        
        .input-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 14px; color: var(--gold); font-weight: bold; margin-left: 5px; }
        
        input, select { 
            width: 100%; padding: 14px; margin-top: 5px; 
            border-radius: 12px; border: 1px solid var(--gold); 
            background: var(--navy); color: white; 
            box-sizing: border-box; font-size: 16px; 
        }

        .row { display: flex; gap: 10px; }
        .row .input-group { flex: 1; }

        /* ปรับปรุงปุ่มจองให้เด่นและอยู่ตรงกลางกึ่งกลาง Card */
        .btn-booking { 
            width: 100%; 
            background: var(--gold); 
            color: var(--dark); 
            padding: 18px; 
            border: none; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 20px; 
            margin-top: 25px; 
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }
        .btn-booking:hover { background: #f1c40f; transform: scale(1.02); }

        .pac-container { border-radius: 12px; font-family: 'Sarabun'; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="logo">MASTER MAID</div>
        
        <div class="input-group">
            <label>👤 ชื่อลูกค้า:</label>
            <input type="text" id="custName" placeholder="ระบุชื่อผู้จอง">
        </div>

        <div class="row">
            <div class="input-group">
                <label>📅 วันที่รับบริการ:</label>
                <input type="date" id="serviceDate">
            </div>
            <div class="input-group">
                <label>💰 ราคา (บาท):</label>
                <input type="number" id="price" placeholder="ระบุราคา">
            </div>
        </div>

        <div class="row">
            <div class="input-group">
                <label>⏰ เวลาเริ่ม:</label>
                <input type="time" id="startTime">
            </div>
            <div class="input-group">
                <label>⌛ เวลาสิ้นสุด:</label>
                <input type="time" id="endTime">
            </div>
        </div>

        <div class="input-group">
            <label>📍 ค้นหาที่อยู่ (Google Maps):</label>
            <input type="text" id="custLoc" placeholder="พิมพ์ชื่อหมู่บ้าน...">
        </div>

        <div class="input-group">
            <label>📞 เบอร์โทรศัพท์:</label>
            <input type="tel" id="phone" placeholder="ระบุเบอร์โทร">
        </div>
        
        <button class="btn-booking" onclick="confirmBooking()">✅ ยืนยันการจองบริการ</button>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCTWK2HDu1QPn54YJMaTmJ5Xk8MLis3PAU", 
        databaseURL: "https://mastermaid-ubon-default-rtdb.asia-southeast1.firebasedatabase.app", 
        projectId: "mastermaid-ubon" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let selectedLat = null, selectedLng = null;

    function initMap() {
        const autocomplete = new google.maps.places.Autocomplete(document.getElementById('custLoc'), {
            componentRestrictions: { country: "th" },
            fields: ["geometry", "formatted_address"]
        });
        autocomplete.addListener("place_changed", () => {
            const place = autocomplete.getPlace();
            if (place.geometry) {
                selectedLat = place.geometry.location.lat();
                selectedLng = place.geometry.location.lng();
            }
        });
    }
    google.maps.event.addDomListener(window, 'load', initMap);

    function confirmBooking() {
        const name = document.getElementById('custName').value;
        const loc = document.getElementById('custLoc').value;
        const price = document.getElementById('price').value;
        const date = document.getElementById('serviceDate').value;
        const start = document.getElementById('startTime').value;
        const end = document.getElementById('endTime').value;
        const tel = document.getElementById('phone').value;

        if(!name || !loc || !selectedLat || !price) {
            return alert("❌ กรุณากรอกข้อมูลและเลือกที่อยู่ให้ครบถ้วนครับ");
        }

        db.ref('available_jobs').push({
            title: name,
            booking_date: date,
            booking_time: start,
            end_time_plan: end,
            price: price,
            detail: loc,
            phone: tel,
            location_url: `https://www.google.com/maps?q=${selectedLat},${selectedLng}`,
            status: "available",
            postedAt: Date.now()
        }).then(() => {
            alert("✅ จองสำเร็จ! ข้อมูลถูกส่งถึงทีมงานแล้ว");
            location.reload();
        });
    }
</script>

</body>
</html>
