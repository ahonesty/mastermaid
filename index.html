<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Maid | จองบริการ</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=places&language=th"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #f4f7f6; text-align: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        .row { display: flex; gap: 10px; }
        button { width: 100%; background: #D4AF37; color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 10px; }
        button:hover { background: #b8952e; }
        .pac-container { border-radius: 8px; font-family: 'Sarabun'; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="color: #0A1931; margin-bottom: 5px;">MASTER MAID</h2>
        <p style="color: #666; margin-bottom: 20px;">จองบริการทำความสะอาด</p>
        
        <input type="text" id="custName" placeholder="ชื่อ-นามสกุล ของคุณ">
        
        <select id="propertyType">
            <option value="บ้านเดี่ยว">บ้านเดี่ยว</option>
            <option value="ทาวน์โฮม / ตึกแถว">ทาวน์โฮม / ตึกแถว</option>
            <option value="คอนโด / หอพัก">คอนโด / หอพัก</option>
            <option value="ออฟฟิศ / สำนักงาน">ออฟฟิศ / สำนักงาน</option>
        </select>

        <input type="date" id="serviceDate">

        <div class="row">
            <input type="time" id="startTime" placeholder="เวลาเริ่ม">
            <input type="time" id="endTime" placeholder="เวลาสิ้นสุด">
        </div>

        <input type="number" id="price" placeholder="ราคาค่าบริการ (บาท)">
        
        <input type="text" id="custLoc" placeholder="พิมพ์ชื่อหมู่บ้าน หรือซอย...">
        
        <input type="tel" id="phone" placeholder="เบอร์โทรศัพท์ติดต่อ">
        
        <button onclick="confirmBooking()">ยืนยันการจองตอนนี้</button>
    </div>

    <script>
        // --- ตั้งค่า Firebase ---
        const firebaseConfig = { 
            apiKey: "AIzaSyCTWK2HDu1QPn54YJMaTmJ5Xk8MLis3PAU", 
            databaseURL: "https://mastermaid-ubon-default-rtdb.asia-southeast1.firebasedatabase.app", 
            projectId: "mastermaid-ubon" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let selectedLat = null, selectedLng = null;

        // --- ระบบ Google Maps ---
        function initAutocomplete() {
            const autocomplete = new google.maps.places.Autocomplete(document.getElementById('custLoc'), {
                componentRestrictions: { country: "th" },
                fields: ["geometry", "formatted_address"]
            });
            autocomplete.addListener("place_changed", () => {
                const place = autocomplete.getPlace();
                if (place.geometry) {
                    selectedLat = place.geometry.location.lat();
                    selectedLng = place.geometry.location.lng();
                }
            });
        }
        google.maps.event.addDomListener(window, 'load', initAutocomplete);

        // --- ส่งข้อมูลเข้า Firebase ---
        function confirmBooking() {
            const name = document.getElementById('custName').value;
            const type = document.getElementById('propertyType').value;
            const date = document.getElementById('serviceDate').value;
            const start = document.getElementById('startTime').value;
            const end = document.getElementById('endTime').value;
            const price = document.getElementById('price').value;
            const loc = document.getElementById('custLoc').value;
            const tel = document.getElementById('phone').value;

            if(!name || !loc || !selectedLat || !date || !start || !end) {
                return alert("❌ กรุณากรอกข้อมูลให้ครบถ้วนและเลือกที่อยู่จากรายการครับ");
            }

            db.ref('available_jobs').push({
                title: name,
                property_type: type,
                booking_date: date,
                booking_time: start,
                end_time_plan: end,
                price: price,
                detail: loc,
                phone: tel,
                location_url: `https://www.google.com/maps?q=${selectedLat},${selectedLng}`,
                status: "available",
                postedAt: Date.now()
            }).then(() => {
                alert("✅ ส่งข้อมูลการจองเรียบร้อยแล้ว!");
                location.reload();
            });
        }
    </script>
</body>
</html>
