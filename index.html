<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Maid | จองบริการ</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=places&language=th"></script>
    
    <style>
        /* คืนค่า CSS ตกแต่งเดิมของคุณ */
        :root { --gold: #D4AF37; --dark: #0A1931; }
        body { font-family: 'Sarabun', sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
        .booking-card { max-width: 500px; margin: auto; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header-img { width: 100%; height: 150px; background: var(--dark); display: flex; align-items: center; justify-content: center; color: var(--gold); }
        .content { padding: 20px; }
        
        /* สไตล์แผนที่ Google Map */
        #map { width: 100%; height: 250px; border-radius: 12px; margin: 15px 0; border: 1px solid #ddd; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #444; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; }
        
        /* สไตล์แพ็กเกจ */
        .package-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .package-item { border: 2px solid #eee; padding: 10px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; }
        .package-item.active { border-color: var(--gold); background: rgba(212,175,55,0.1); }
        
        .price-display { text-align: center; font-size: 24px; color: var(--gold); font-weight: bold; margin: 20px 0; padding: 10px; background: #fff9e6; border-radius: 10px; }
        .btn-confirm { width: 100%; background: var(--dark); color: white; padding: 18px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="booking-card">
    <div class="header-img">
        <h1>MASTER MAID</h1>
    </div>
    
    <div class="content">
        <div class="form-group">
            <label>👤 ชื่อลูกค้า:</label>
            <input type="text" id="custName" placeholder="ระบุชื่อของคุณ">
        </div>

        <label>📦 เลือกแพ็กเกจบริการ:</label>
        <div class="package-grid">
            <div class="package-item active" onclick="selectPkg(this, 550, 'S')">
                <b>Size S</b><br><small>คอนโด/หอพัก</small><br><b>550.-</b>
            </div>
            <div class="package-item" onclick="selectPkg(this, 750, 'M')">
                <b>Size M</b><br><small>ทาวน์โฮม</small><br><b>750.-</b>
            </div>
            <div class="package-item" onclick="selectPkg(this, 1200, 'L')">
                <b>Size L</b><br><small>บ้านเดี่ยว</small><br><b>1,200.-</b>
            </div>
            <div class="package-item" onclick="selectPkg(this, 0, 'Custom')">
                <b>กำหนดเอง</b><br><small>ตามตกลง</small><br><b>-</b>
            </div>
        </div>

        <div class="form-group">
            <label>📍 ค้นหาสถานที่ & ปักหมุด:</label>
            <input type="text" id="custLoc" placeholder="พิมพ์ที่อยู่/โครงการ...">
            <div id="map"></div> </div>

        <div class="form-group">
            <label>📅 วันที่และเวลา:</label>
            <div style="display:flex; gap:10px;">
                <input type="date" id="serviceDate" style="flex:2;">
                <input type="time" id="startTime" value="09:00" style="flex:1;">
            </div>
        </div>

        <div class="price-display">
            ราคา: <span id="displayPrice">550</span> บาท
        </div>

        <button class="btn-confirm" onclick="confirmBooking()">ยืนยันการจอง</button>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCTWK2HDu1QPn54YJMaTmJ5Xk8MLis3PAU", 
        databaseURL: "https://mastermaid-ubon-default-rtdb.asia-southeast1.firebasedatabase.app", 
        projectId: "mastermaid-ubon" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentPrice = 550;
    let selectedPkgName = "Size S";
    let map, marker, autocomplete;
    let selectedLat = 15.244, selectedLng = 104.847; // พิกัดอุบลฯ เริ่มต้น

    // --- ระบบ Google Maps เดิม ---
    function initMap() {
        map = new google.maps.Map(document.getElementById("map"), {
            center: { lat: selectedLat, lng: selectedLng },
            zoom: 15,
            mapTypeControl: false
        });
        marker = new google.maps.Marker({ map: map, draggable: true });

        const input = document.getElementById('custLoc');
        autocomplete = new google.maps.places.Autocomplete(input);
        
        autocomplete.addListener("place_changed", () => {
            const place = autocomplete.getPlace();
            if (place.geometry) {
                map.setCenter(place.geometry.location);
                marker.setPosition(place.geometry.location);
                selectedLat = place.geometry.location.lat();
                selectedLng = place.geometry.location.lng();
            }
        });
    }

    // ฟังก์ชันเลือกแพ็กเกจ
    function selectPkg(el, price, name) {
        document.querySelectorAll('.package-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        currentPrice = price;
        selectedPkgName = name;
        document.getElementById('displayPrice').innerText = price > 0 ? price : "ตามตกลง";
    }

    function confirmBooking() {
        const name = document.getElementById('custName').value;
        const address = document.getElementById('custLoc').value;
        if (!name || !address) return alert("กรุณาระบุชื่อและสถานที่ครับ");

        db.ref('available_jobs').push({
            title: name,
            property_type: selectedPkgName,
            booking_date: document.getElementById('serviceDate').value,
            booking_time: document.getElementById('startTime').value,
            price: currentPrice,
            detail: address,
            location_url: `https://www.google.com/maps?q=${selectedLat},${selectedLng}`,
            status: "available",
            postedAt: Date.now()
        }).then(() => {
            alert("จองสำเร็จ! ข้อมูลถูกส่งไปยังระบบแม่บ้านแล้ว");
            location.reload();
        });
    }

    google.maps.event.addDomListener(window, 'load', initMap);
</script>
</body>
</html>
