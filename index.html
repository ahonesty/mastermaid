<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Maid Thailand | จองแม่บ้านพรีเมียม</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD7Qqf1Z9KQBuvipDzgIc5laJLz9SiOBH8&libraries=places&language=th"></script>

    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --primary: #0A1931; --gold: #D4AF37; --gold-dark: #B8962D; --bg: #F4F7F6; }
        body { font-family: 'Sarabun', sans-serif; margin: 0; background: var(--bg); color: #1A1A1A; padding-bottom: 100px; overflow-x: hidden; }
        nav { background: #fff; padding: 15px 5%; display: flex; justify-content: center; align-items: center; box-shadow: 0 2px 15px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
        .logo-img { height: 55px; }
        .hero { background: linear-gradient(rgba(10, 25, 49, 0.8), rgba(10, 25, 49, 0.8)), url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=1920'); background-size: cover; background-position: center; height: 300px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: #fff; padding: 0 20px; }
        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-bottom: 50px; margin-top: -80px; }
        .card { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 25px; }
        .booking-box { background: #fff; border-radius: 30px; padding: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); }
        .section-title { border-left: 5px solid var(--gold); padding-left: 15px; margin: 30px 0 20px; color: var(--primary); font-size: 20px; font-weight: 700; }
        input, select, textarea { width: 100%; padding: 16px; margin-top: 10px; border: 1px solid #eee; border-radius: 12px; font-family: 'Sarabun'; box-sizing: border-box; font-size: 15px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        #map { height: 400px; border-radius: 20px; border: 2px solid #eee; margin-top: 15px; }
        #pac-input { width: 90%; left: 5% !important; top: 15px !important; padding: 12px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.3); border: none; }
        .summary-box { background: var(--primary); color: #fff; border-radius: 20px; padding: 30px; margin-top: 30px; text-align: center; }
        .total-price-display { color: var(--gold); font-size: 36px; font-weight: 700; margin-top: 5px; }
        .footer-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; padding: 15px; box-shadow: 0 -5px 20px rgba(0,0,0,0.08); text-align: center; z-index: 1001; }
        .submit-btn { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: var(--primary); padding: 18px 60px; border: none; border-radius: 50px; font-size: 18px; font-weight: 800; cursor: pointer; width: 95%; max-width: 450px; }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(10, 25, 49, 0.98); z-index: 2000; color:#fff; text-align:center; padding-top:15vh; }
        .line-btn { display: inline-flex; align-items: center; background: #06C755; color: white !important; text-decoration: none; padding: 15px 30px; border-radius: 12px; font-weight: 700; margin-top: 20px; }
    </style>
</head>
<body>

    <nav><img src="logo.png" alt="Master Maid" class="logo-img"></nav>

    <div class="hero">
        <h1>บริการแม่บ้านพรีเมียม อุบลฯ</h1>
        <p>ส่งต่อความสะอาดด้วยใจ จัดการงานจองได้แบบ Real-time</p>
    </div>

    <div class="container">
        <div class="card-grid">
            <div class="card"><img src="https://images.unsplash.com/photo-1527515637462-cff94eecc1ac?q=80&w=1000"><div class="card-body"><h3>ทั่วไป</h3><p>550.- / 2 ชม.</p></div></div>
            <div class="card"><img src="https://images.pexels.com/photos/4099467/pexels-photo-4099467.jpeg?auto=compress&w=1260"><div class="card-body"><h3>Deep Clean</h3><p>เริ่มต้น 2,000.-</p></div></div>
        </div>

        <div class="booking-box">
            <form id="maidForm" action="https://hook.us2.make.com/u4ddkucyj2gbd9gj14om5cdtu3qjnzxx" method="POST">
                
                <div class="section-title">1. ข้อมูลติดต่อ</div>
                <div class="grid-2">
                    <input type="text" name="name" placeholder="ชื่อ-นามสกุล" required>
                    <input type="tel" name="phone" id="phone" placeholder="เบอร์โทรศัพท์" required>
                </div>

                <div class="section-title">2. ปักหมุดบ้าน</div>
                <div style="position: relative;">
                    <input id="pac-input" type="text" placeholder="🔍 ค้นหาหมู่บ้าน หรือสถานที่...">
                    <div id="map"></div>
                </div>
                <input type="hidden" name="google_maps_link" id="google_maps_link">
                <textarea name="address_detail" rows="2" placeholder="ที่อยู่ละเอียด" required></textarea>

                <div class="section-title">3. เลือกวันและเวลา</div>
                <div class="grid-2">
                    <select name="service_type" id="service_type" onchange="calculate()">
                        <option value="General">ทำความสะอาดทั่วไป</option>
                        <option value="Big">Deep / Big Cleaning</option>
                    </select>
                    <input type="date" name="date" id="book_date" required>
                </div>
                <div class="grid-2">
                    <select name="start_time" id="start_time" onchange="calculate()">
                        <option value="09">09:00 น.</option>
                        <option value="13">13:00 น.</option>
                    </select>
                    <select name="duration" id="duration" onchange="calculate()">
                        <option value="2">2 ชม.</option>
                        <option value="4">4 ชม.</option>
                        <option value="8">8 ชม.</option>
                    </select>
                </div>

                <input type="hidden" name="maid_id" value="Pending">
                <input type="hidden" name="total_price" id="total_hidden">

                <div class="summary-box">
                    <div class="total-price-display">ยอดรวม: <span id="total_display">550</span>.- บาท</div>
                </div>
            </form>
        </div>
    </div>

    <div class="footer-bar">
        <button type="button" class="submit-btn" onclick="document.getElementById('maidForm').requestSubmit()">จองตอนนี้</button>
    </div>

    <div class="overlay" id="overlay">
        <i class="fas fa-check-circle" style="font-size: 70px; color: var(--gold);"></i>
        <h2>จองสำเร็จ!</h2>
        <a href="https://line.me/ti/p/@301xqlpj" class="line-btn"><i class="fab fa-line"></i> แจ้งสลิปทาง LINE</a>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCTWK2HDu1QPn54YJMaTmJ5Xk8MLis3PAU", databaseURL: "https://mastermaid-ubon-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);

        let map, marker;
        function initMap() {
            const ubon = { lat: 15.2294, lng: 104.8564 };
            map = new google.maps.Map(document.getElementById("map"), { center: ubon, zoom: 15 });
            marker = new google.maps.Marker({ map: map, draggable: true, position: ubon });
            
            const updateLink = (lat, lng) => {
                document.getElementById("google_maps_link").value = `https://www.google.com/maps?q=${lat},${lng}`;
            };
            
            updateLink(ubon.lat, ubon.lng);
            map.addListener("click", (e) => { marker.setPosition(e.latLng); updateLink(e.latLng.lat(), e.latLng.lng()); });
            
            const input = document.getElementById("pac-input");
            const autocomplete = new google.maps.places.Autocomplete(input);
            autocomplete.addListener("place_changed", () => {
                const place = autocomplete.getPlace();
                if (!place.geometry) return;
                map.setCenter(place.geometry.location);
                marker.setPosition(place.geometry.location);
                updateLink(place.geometry.location.lat(), place.geometry.location.lng());
            });
        }

        function calculate() {
            const service = document.getElementById('service_type').value;
            const hours = parseInt(document.getElementById('duration').value);
            let price = (service === "Big") ? 2000 : (hours === 2 ? 550 : 800 + (hours-3)*200);
            document.getElementById('total_display').innerText = price.toLocaleString();
            document.getElementById('total_hidden').value = price;
        }

        document.getElementById('maidForm').onsubmit = function(e) {
            e.preventDefault();
            document.getElementById('overlay').style.display = 'block';
            
            // 🚀 ส่งข้อมูลเข้า Make.com
            fetch(this.action, {
                method: 'POST',
                body: new FormData(this),
                mode: 'no-cors'
            });
        };

        google.maps.event.addDomListener(window, 'load', initMap);
        window.onload = calculate;
    </script>
</body>
</html>
