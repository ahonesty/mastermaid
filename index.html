<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Maid | จองบริการทำความสะอาด</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=places&language=th"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --dark: #0A1931; --navy: #1A2F4F; }
        body { font-family: 'Sarabun', sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
        .booking-card { max-width: 550px; margin: auto; background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.15); }
        
        /* Header Logo (UI เดิม) */
        .header-section { background: var(--dark); padding: 30px; text-align: center; border-bottom: 4px solid var(--gold); }
        .logo-text { color: var(--gold); font-size: 32px; font-weight: bold; margin: 0; letter-spacing: 2px; }
        .logo-sub { color: white; font-size: 14px; opacity: 0.8; margin-top: 5px; }
        
        .content { padding: 25px; }
        .form-group { margin-bottom: 18px; text-align: left; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: var(--dark); font-size: 13px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 16px; }
        .row { display: flex; gap: 10px; }

        /* Package Grid (UI เดิม) */
        .package-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .package-box { border: 2px solid #eee; padding: 15px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.3s; }
        .package-box.active { border-color: var(--gold); background: rgba(212,175,55,0.05); }
        .package-box b { color: var(--dark); display: block; font-size: 18px; }

        /* Map (UI เดิม) */
        #map { width: 100%; height: 250px; border-radius: 15px; margin-top: 10px; border: 1px solid #ddd; }
        
        .btn-booking { width: 100%; background: var(--gold); color: var(--dark); padding: 18px; border: none; border-radius: 15px; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="booking-card">
    <div class="header-section">
        <h1 class="logo-text">MASTER MAID</h1>
        <div class="logo-sub">Professional Cleaning Service Ubon Ratchathani</div>
    </div>
    
    <div class="content">
        <div class="form-group">
            <label>👤 ชื่อลูกค้า:</label>
            <input type="text" id="custName" placeholder="ระบุชื่อของคุณ">
        </div>

        <div class="form-group">
            <label>🏠 ประเภทที่พัก:</label>
            <select id="propertyType">
                <option value="บ้านเดี่ยว">บ้านเดี่ยว</option>
                <option value="ทาวน์โฮม / ตึกแถว">ทาวน์โฮม / ตึกแถว</option>
                <option value="คอนโด / หอพัก">คอนโด / หอพัก</option>
            </select>
        </div>

        <div class="row">
            <div style="flex:1;" class="form-group">
                <label>🛏️ ห้องนอน</label>
                <input type="number" id="bedRoom" value="0">
            </div>
            <div style="flex:1;" class="form-group">
                <label>🚿 ห้องน้ำ</label>
                <input type="number" id="bathRoom" value="0">
            </div>
        </div>

        <div class="form-group">
            <label>📐 พื้นที่บ้าน (ตารางเมตร):</label>
            <input type="number" id="areaSize" placeholder="เช่น 150">
        </div>

        <div class="form-group">
            <label>📅 วันที่รับบริการ:</label>
            <input type="date" id="serviceDate">
        </div>

        <div class="row">
            <div style="flex:1;" class="form-group">
                <label>⏰ เริ่ม</label>
                <input type="time" id="startTime">
            </div>
            <div style="flex:1;" class="form-group">
                <label>⌛ จบ</label>
                <input type="time" id="endTime">
            </div>
        </div>

        <div class="form-group">
            <label>📍 ค้นหาและระบุตำแหน่งที่ตั้ง:</label>
            <input type="text" id="custLoc" placeholder="พิมพ์ชื่อหมู่บ้าน หรือซอย (Google Maps)">
            <div id="map"></div>
        </div>

        <div class="form-group">
            <label>📞 เบอร์โทรศัพท์:</label>
            <input type="tel" id="phone" placeholder="08x-xxxxxxx">
        </div>

        <div class="form-group">
            <label>💰 ราคาค่าบริการ (บาท):</label>
            <input type="number" id="price" placeholder="ระบุราคาที่ตกลงกัน">
        </div>

        <button class="btn-booking" onclick="confirmBooking()">ยืนยันการจองตอนนี้</button>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCTWK2HDu1QPn54YJMaTmJ5Xk8MLis3PAU", 
        databaseURL: "https://mastermaid-ubon-default-rtdb.asia-southeast1.firebasedatabase.app", 
        projectId: "mastermaid-ubon" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let map, marker, selectedLat, selectedLng;

    // --- ฟังก์ชัน Google Maps & Autocomplete (UI เดิม) ---
    function initMap() {
        const defaultLoc = { lat: 15.244, lng: 104.847 }; // อุบลฯ
        map = new google.maps.Map(document.getElementById("map"), {
            center: defaultLoc,
            zoom: 15,
            mapTypeControl: false
        });
        marker = new google.maps.Marker({ position: defaultLoc, map: map, draggable: true });

        const input = document.getElementById('custLoc');
        const autocomplete = new google.maps.places.Autocomplete(input, { componentRestrictions: { country: "th" } });
        
        autocomplete.addListener("place_changed", () => {
            const place = autocomplete.getPlace();
            if (place.geometry) {
                map.setCenter(place.geometry.location);
                marker.setPosition(place.geometry.location);
                selectedLat = place.geometry.location.lat();
                selectedLng = place.geometry.location.lng();
            }
        });

        marker.addListener("dragend", () => {
            selectedLat = marker.getPosition().lat();
            selectedLng = marker.getPosition().lng();
        });
    }

    // --- ฟังก์ชันยืนยันการจอง (ใช้ Logic จากโค้ดล่าสุดที่คุณส่งมา) ---
    function confirmBooking() {
        const name = document.getElementById('custName').value;
        const rooms = `${document.getElementById('bedRoom').value} นอน, ${document.getElementById('bathRoom').value} น้ำ`;
        const area = document.getElementById('areaSize').value;
        const locName = document.getElementById('custLoc').value;

        if(!name || !selectedLat) return alert("กรุณากรอกข้อมูลและเลือกตำแหน่งในแผนที่ให้ครบถ้วน");

        db.ref('available_jobs').push({
            title: name, 
            property_type: document.getElementById('propertyType').value,
            room_details: rooms,
            house_area: area + " ตร.ม.",
            booking_date: document.getElementById('serviceDate').value,
            booking_time: document.getElementById('startTime').value,
            end_time_plan: document.getElementById('endTime').value,
            price: document.getElementById('price').value,
            detail: locName,
            phone: document.getElementById('phone').value,
            location_url: `https://www.google.com/maps?q=${selectedLat},${selectedLng}`,
            status: "available", 
            postedAt: Date.now()
        }).then(() => { 
            alert("จองสำเร็จ! งานถูกส่งเข้าระบบเรียบร้อยแล้ว"); 
            location.reload(); 
        });
    }

    google.maps.event.addDomListener(window, 'load', initMap);
</script>
</body>
</html>
